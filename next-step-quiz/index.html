<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<title>What's Your Next Step? — A 60-second street quiz</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1f9ed;</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F4EFE3;
  --cream-2: #ECE5D2;
  --cream-3: #E0D6BD;
  --ink: #0F0F0F;
  --ink-soft: #2A2A2A;
  --dim: #6B6557;
  --accent: #DC4D2A;
  --accent-soft: #FAE3D9;
  --good: #2D6A4F;
  --line: #1A1A1A;
}
* , *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { min-height: 100vh; background: var(--cream); }
body {
  font-family: 'Space Grotesk', system-ui, sans-serif;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: 'ss01', 'ss02';
  overflow-x: hidden;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

/* ===== App shell ===== */
.app {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: 32px 28px 32px;
  max-width: 820px;
  margin: 0 auto;
  position: relative;
}

/* ===== Top bar (progress) ===== */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
  min-height: 32px;
}
.brand {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--dim);
}
.brand .dot { color: var(--accent); }
.progress {
  display: flex;
  gap: 6px;
  align-items: center;
}
.progress .pip {
  width: 18px;
  height: 4px;
  border-radius: 2px;
  background: var(--cream-3);
  transition: background 0.35s ease, width 0.35s ease;
}
.progress .pip.done { background: var(--ink); }
.progress .pip.active { background: var(--accent); width: 32px; }

/* ===== Stage ===== */
.stage {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  min-height: 0;
}
.scene {
  display: flex;
  flex-direction: column;
  gap: 22px;
  animation: slideIn 0.32s cubic-bezier(.2,.8,.2,1);
}
.scene.back { animation: slideInBack 0.32s cubic-bezier(.2,.8,.2,1); }
.scene.fade { animation: fadeIn 0.45s ease; }
@keyframes slideIn {
  from { opacity: 0; transform: translateX(28px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes slideInBack {
  from { opacity: 0; transform: translateX(-28px); }
  to { opacity: 1; transform: translateX(0); }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== Welcome ===== */
.welcome { text-align: left; padding: 12px 0 20px; }
.welcome .eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 18px;
}
.welcome h1 {
  font-size: clamp(40px, 7vw, 64px);
  line-height: 0.98;
  letter-spacing: -0.02em;
  font-weight: 700;
  margin-bottom: 22px;
}
.welcome h1 .underline {
  position: relative;
  white-space: nowrap;
}
.welcome h1 .underline::after {
  content: '';
  position: absolute;
  left: -2px; right: -2px; bottom: 4px;
  height: 14px;
  background: var(--accent);
  z-index: -1;
  opacity: 0.35;
  border-radius: 2px;
}
.welcome p {
  font-size: 19px;
  line-height: 1.45;
  color: var(--ink-soft);
  margin-bottom: 14px;
  max-width: 540px;
}
.welcome .meta {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--dim);
  margin-top: 12px;
  margin-bottom: 28px;
  display: flex;
  gap: 18px;
  flex-wrap: wrap;
}
.welcome .meta span::before {
  content: '— ';
  color: var(--accent);
}

/* ===== Question ===== */
.leadin {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 4px;
}
.leadin .you-said { color: var(--accent); }
.leadin .echo {
  color: var(--ink);
  background: var(--accent-soft);
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: none;
  letter-spacing: 0;
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 500;
  font-size: 13px;
}
.qprompt {
  font-size: clamp(28px, 4.6vw, 40px);
  line-height: 1.08;
  letter-spacing: -0.015em;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--ink);
}
.qsub {
  font-size: 16px;
  color: var(--dim);
  margin-bottom: 6px;
}

/* ===== Options ===== */
.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 4px;
}
.opt {
  display: flex;
  align-items: center;
  gap: 14px;
  width: 100%;
  text-align: left;
  background: #fff;
  border: 2px solid var(--line);
  border-radius: 14px;
  padding: 18px 18px;
  min-height: 76px;
  font-size: 18px;
  font-weight: 500;
  line-height: 1.25;
  color: var(--ink);
  transition: transform 0.08s ease, background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
  box-shadow: 4px 4px 0 var(--line);
  position: relative;
}
.opt .letter {
  display: flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 36px;
  height: 36px;
  background: var(--cream-2);
  border: 1.5px solid var(--line);
  border-radius: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
}
.opt .label { flex: 1; }
.opt:hover { transform: translate(-1px, -1px); box-shadow: 5px 5px 0 var(--line); }
.opt:active, .opt.tapped {
  transform: translate(2px, 2px);
  box-shadow: 2px 2px 0 var(--line);
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.opt:active .letter, .opt.tapped .letter {
  background: #fff;
  border-color: #fff;
}

/* ===== Bottom bar ===== */
.bottombar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 22px;
  min-height: 36px;
}
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-radius: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--dim);
  background: transparent;
  border: 1.5px solid transparent;
  transition: all 0.18s ease;
}
.back-btn:hover { color: var(--ink); border-color: var(--cream-3); }
.back-btn.hidden { visibility: hidden; }
.back-btn .arrow { font-size: 14px; }
.foot-note {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--dim);
}

/* ===== Big start button ===== */
.big-btn {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  background: var(--ink);
  color: var(--cream);
  padding: 22px 32px;
  border-radius: 14px;
  font-size: 20px;
  font-weight: 600;
  border: 2px solid var(--ink);
  box-shadow: 5px 5px 0 var(--accent);
  transition: transform 0.1s ease, box-shadow 0.1s ease;
}
.big-btn:active {
  transform: translate(3px, 3px);
  box-shadow: 2px 2px 0 var(--accent);
}
.big-btn .chev {
  font-size: 22px;
  transition: transform 0.2s ease;
}
.big-btn:hover .chev { transform: translateX(4px); }

/* ===== Result page ===== */
.result {
  display: flex;
  flex-direction: column;
  gap: 24px;
  padding-bottom: 80px;
}
.result .crown {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 4px;
}
.result h1 {
  font-size: clamp(40px, 8vw, 68px);
  line-height: 0.96;
  letter-spacing: -0.025em;
  font-weight: 700;
  color: var(--ink);
}
.result .tagline {
  font-size: 22px;
  line-height: 1.3;
  color: var(--ink-soft);
  font-weight: 500;
  max-width: 600px;
}
.section-title {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 12px;
}
.strengths {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.strength {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  background: #fff;
  border: 1.5px solid var(--line);
  border-radius: 10px;
  font-size: 17px;
  font-weight: 500;
  box-shadow: 3px 3px 0 var(--line);
}
.strength .check {
  flex: 0 0 22px;
  width: 22px;
  height: 22px;
  background: var(--accent);
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  margin-top: 1px;
}
.steps {
  display: flex;
  flex-direction: column;
  gap: 10px;
  counter-reset: steps;
}
.step {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 16px 18px;
  background: #fff;
  border: 1.5px solid var(--line);
  border-radius: 10px;
  box-shadow: 3px 3px 0 var(--line);
  font-size: 17px;
  line-height: 1.35;
}
.step .num {
  flex: 0 0 32px;
  width: 32px;
  height: 32px;
  background: var(--ink);
  color: var(--cream);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 15px;
}
.first-action {
  margin-top: 6px;
  background: var(--ink);
  color: var(--cream);
  border-radius: 14px;
  padding: 22px 24px;
  border: 2px solid var(--ink);
  box-shadow: 5px 5px 0 var(--accent);
}
.first-action .label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}
.first-action .body {
  font-size: 21px;
  font-weight: 600;
  line-height: 1.25;
}

/* trait bars */
.bars {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.bar-row {
  display: grid;
  grid-template-columns: 130px 1fr 36px;
  align-items: center;
  gap: 12px;
  font-size: 14px;
}
.bar-row .name {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--dim);
}
.bar-row .name.top { color: var(--accent); }
.bar-row .name.second { color: var(--ink); }
.bar-track {
  height: 10px;
  background: var(--cream-2);
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid var(--cream-3);
}
.bar-fill {
  height: 100%;
  background: var(--ink);
  border-radius: 5px;
  transition: width 0.8s cubic-bezier(.2,.8,.2,1);
}
.bar-fill.top { background: var(--accent); }
.bar-row .pct {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--dim);
  text-align: right;
}

/* runner-up */
.runner-up {
  background: var(--cream-2);
  border: 1.5px dashed var(--cream-3);
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 15px;
  color: var(--ink-soft);
  line-height: 1.4;
}
.runner-up strong { color: var(--accent); font-weight: 700; }

/* result actions */
.result-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.btn-primary, .btn-secondary {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 18px 22px;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 600;
  flex: 1;
  min-height: 60px;
  transition: transform 0.1s ease, box-shadow 0.1s ease;
}
.btn-primary {
  background: var(--ink);
  color: var(--cream);
  border: 2px solid var(--ink);
  box-shadow: 4px 4px 0 var(--accent);
}
.btn-primary:active {
  transform: translate(2px, 2px);
  box-shadow: 2px 2px 0 var(--accent);
}
.btn-secondary {
  background: transparent;
  color: var(--ink);
  border: 2px solid var(--ink);
  box-shadow: 4px 4px 0 var(--line);
}
.btn-secondary:active {
  transform: translate(2px, 2px);
  box-shadow: 2px 2px 0 var(--line);
}

/* ===== iPad portrait sizing ===== */
@media (min-width: 700px) {
  .app { padding: 48px 60px 48px; }
  .opt { padding: 22px 22px; min-height: 86px; font-size: 20px; }
  .opt .letter { flex: 0 0 40px; height: 40px; font-size: 15px; }
}
@media (max-width: 380px) {
  .app { padding: 24px 18px; }
  .opt { padding: 14px 14px; min-height: 68px; font-size: 16px; }
}

/* ===== Print stylesheet (PDF for AirDrop) ===== */
@media print {
  @page { margin: 18mm 16mm; size: A4; }
  body { background: #fff; color: #000; }
  .app { padding: 0; max-width: none; }
  .topbar, .bottombar, .result-actions, #print-hide { display: none !important; }
  .scene { animation: none !important; }
  .first-action { background: #000 !important; color: #fff !important; border: 2px solid #000 !important; box-shadow: none !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .first-action .label { color: #fff !important; }
  .strength, .step { border: 1.5px solid #000; box-shadow: none; page-break-inside: avoid; }
  .strength .check { background: #000 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .step .num { background: #000 !important; color: #fff !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .bar-fill, .bar-fill.top { background: #000 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .runner-up { background: #f5f5f5 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .result h1 { color: #000; }
  .result .crown { color: #000; }
  .leadin .echo, .welcome h1 .underline::after { background: transparent !important; }
}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
/* ============================================================
   TRAIT MODEL
   ============================================================ */
const TRAITS = ['founder','builder','creative','specialist','expert','leader','maker','strategist','performer','explorer'];
const TRAIT_LABELS = {
  founder:    'Founder',
  builder:    'Builder',
  creative:   'Creative',
  specialist: 'Specialist',
  expert:     'Expert',
  leader:     'Leader',
  maker:      'Maker',
  strategist: 'Strategist',
  performer:  'Performer',
  explorer:   'Explorer'
};

/* ============================================================
   ARCHETYPES
   ============================================================ */
const ARCHETYPES = {
  founder: {
    name: "The Visionary Founder",
    headline: "You're wired to start things from scratch — and that's rarer than you think.",
    strengths: [
      "You see opportunities other people walk past",
      "You're willing to bet on yourself when no one else will",
      "You think in systems and outcomes, not job titles"
    ],
    nextSteps: [
      "Pick ONE problem you've personally felt and write down 3 different ways to solve it.",
      "Talk to 5 people this week who have that problem. Just ask, don't pitch.",
      "Set a 30-day deadline to put something — anything — in front of paying customers."
    ],
    firstAction: "Today: write a single sentence describing the business you'd start tomorrow if you had to."
  },

      "You can hold a job AND a vision without breaking",
      "You'd rather earn $1 from a stranger than $100 from a guess"
    ],
    nextSteps: [
      "Pick a skill you already have. List 3 ways someone could pay you for it on the side.",
      "Set a goal: your first $100 from your side thing within 30 days.",
      "Block 4 hours a week — same time, every week — and protect them like rent."
    ],
    firstAction: "Today: list every single skill you've been paid for OR complimented on."
  },
  creative: {
    name: "The Creative Freelancer",
    headline: "Your work is the work. People will pay for the way you see things — once you stop hiding it.",
    strengths: [
      "You have a point of view most people don't",
      "You make things that didn't exist before",
      "You'd rather be original than safe"
    ],
    nextSteps: [
      "Pick your medium. Commit to publishing one thing a week for 8 weeks straight.",
      "Find 3 freelancers a year ahead of you. Study how they got their first 10 clients.",
      "Build a single page online: your best 5 pieces of work + how to hire you."
    ],
    firstAction: "Today: pick the ONE thing you make best, and put it somewhere public."
  },
  specialist: {
    name: "The Skilled Specialist",
    headline: "You want a real career — and you want to be excellent at it. Don't apologise for that.",

      "You'd rather go deep than wide"
    ],
    nextSteps: [
      "Name the role you want — be specific (industry, company size, level) — by Friday.",

    firstAction: "Today: write down the exact job title you want to hold five years from now."

      "You go deep on the things you actually care about",

    nextSteps: [
      "Pick the ONE topic friends already ask you for help with. That's your lane.",

      "Set your first paid rate — even if it scares you. Then raise it next month."
    ],
    firstAction: "Today: write down the 3 things people already ask you for help with."
  },
  leader: {
    name: "The People-First Leader",
    headline: "You don't just want to do the work — you want to bring others with you. The world needs more of that.",
    strengths: [
      "You read people and rooms quickly",
      "You make others around you better",
      "You take responsibility when no one else will"
    ],
    nextSteps: [
      "Volunteer to lead ONE thing this month. A project, a group, an event — anything.",
      "Identify a leader you genuinely admire. Ask them for a 20-minute coffee.",
      "Get clear: do you want to lead inside a company, or build your own team?"
    ],
    firstAction: "Today: name ONE person you could mentor or actively help right now."
  },
  maker: {
    name: "The Hands-On Maker",
    headline: "You think with your hands. Don't let anyone talk you out of that — the world is short on people who can actually build things.",
    strengths: [
      "You can make real, tangible things — not just talk about them",
      "You're not afraid of hard or physical work",
      "Your skills are real and visible to anyone who sees your work"
    ],
    nextSteps: [
      "Pick a trade or craft you respect. Find someone to apprentice or learn under.",
      "Make 3 things this month — finish them, photograph them, share them.",

    ],
    firstAction: "Today: pick up the tool, the keyboard, the brush — and make ONE thing. Today."
  },
  strategist: {
    name: "The Quiet Strategist",
    headline: "You play the long game. That's how real wealth and real edge actually get built — slowly, then suddenly.",
    strengths: [
      "You think before you move",
      "You see patterns others miss",
      "You're not seduced by hype or noise"
    ],
    nextSteps: [

    ],
    firstAction: "Today: write down what 'enough' actually looks like for you — in dollars and lifestyle."
  },
  performer: {
    name: "The Performer / Creator",

const Q1_TO_Q2 = ['q2_founder','q2_craft','q2_help','q2_make','q2_explore'];
const MAX_QUESTIONS = 10;

function emptyScores() {
  const s = {};
  TRAITS.forEach(t => s[t] = 0);
  return s;
}
function topTraits(scores) {
  return TRAITS.slice().sort((a,b) => scores[b] - scores[a]);
}
function leadGap(scores) {
  const sorted = topTraits(scores);
  return scores[sorted[0]] - scores[sorted[1]];
}

function selectNextQuestion(state) {
  const answered = state.history.length;

  if (answered === 0) return QUESTIONS.q1;
  if (answered === 1) return QUESTIONS[Q1_TO_Q2[state.history[0].optionIdx]];

  // Stop conditions
  if (answered >= MAX_QUESTIONS) return null;

  const sorted = topTraits(state.scores);
  const top = sorted[0], second = sorted[1];
  const gap = state.scores[top] - state.scores[second];
  const total = TRAITS.reduce((a,t) => a + state.scores[t], 0);

  // Mode shift
  const inConfirm = (answered >= 4 && gap >= 4) || (answered >= 5 && gap >= 3);

  // Early finish: only if VERY clear and we've had enough
  if (answered >= 7 && gap >= 6) return null;

  // Build candidate pool
  const candidates = Object.values(QUESTIONS).filter(q =>
    q.pool && !state.asked.includes(q.id)
  );
  if (candidates.length === 0) return null;

  // Score candidates
  const scored = candidates.map(q => {
    let s = 0;
    if (inConfirm) {
      if (q.confirmsTraits && q.confirmsTraits.includes(top))    s += 100;
      if (q.confirmsTraits && q.confirmsTraits.includes(second)) s += 30;
      if (q.exploresTraits && q.exploresTraits.includes(top))    s += 10;
    } else {
      if (q.exploresTraits && q.exploresTraits.includes(top))    s += 25;
      if (q.exploresTraits && q.exploresTraits.includes(second)) s += 18;
      // bonus for differentiating top vs second
      if (q.exploresTraits && q.exploresTraits.includes(top) && q.exploresTraits.includes(second)) s += 15;
    }
    s += Math.random() * 4;
    return { q, s };
  });

  scored.sort((a,b) => b.s - a.s);
  return scored[0].q;
}

function determineArchetype(scores) {
  const sorted = topTraits(scores);
  let top = sorted[0];
  // If almost nothing answered or all near-zero, push to explorer
  const total = TRAITS.reduce((a,t) => a + scores[t], 0);
  if (total < 6) top = 'explorer';
  return top;
}

/* ============================================================
   STATE + RENDER
   ============================================================ */
const app = document.getElementById('app');
let state = null;

function fresh() {
  state = {
    scores: emptyScores(),
    history: [],   // [{qId, optionIdx, echo, effects}]
    asked: [],     // qIds shown
    direction: 'forward'
  };
}

function renderWelcome() {
  app.innerHTML = `
    <div class="topbar">
      <div class="brand">Sev<span class="dot">.</span> Next Step Quiz</div>
      <div class="progress" aria-hidden="true"></div>
    </div>
    <div class="stage">
      <div class="scene fade welcome">
        <div class="eyebrow">60-second street quiz</div>
        <h1>What's your <span class="underline">next step?</span></h1>
        <p>This quiz figures out the kind of work you're actually wired for — career, business, craft, or something in between.</p>
        <p>There are no right answers. Tap whichever option feels closest. It only finishes when something becomes clear.</p>
        <div class="meta">
          <span>Up to 10 questions</span>
          <span>No personal info</span>
          <span>Save your result at the end</span>
        </div>
        <button class="big-btn" id="start-btn">
          <span>Let's go</span>
          <span class="chev">→</span>
        </button>
      </div>
    </div>
  `;
  document.getElementById('start-btn').addEventListener('click', () => {
    fresh();
    renderQuestion();
  });
}

function renderProgress() {
  const total = MAX_QUESTIONS;
  const done = state.history.length;
  let html = '';
  for (let i = 0; i < total; i++) {
    const cls = i < done ? 'pip done' : (i === done ? 'pip active' : 'pip');
    html += `<div class="${cls}"></div>`;
  }
  return html;
}

function renderQuestion() {
  const q = selectNextQuestion(state);
  if (!q) return renderResult();

  if (!state.asked.includes(q.id)) state.asked.push(q.id);

  const lastEntry = state.history[state.history.length - 1];
  const showLeadin = !!lastEntry && q.id !== 'q1';
  const directionClass = state.direction === 'back' ? 'back' : '';

  const optsHtml = q.options.map((opt, i) => `
    <button class="opt" data-idx="${i}" tabindex="0">
      <div class="letter">${String.fromCharCode(65 + i)}</div>
      <div class="label">${opt.label}</div>
    </button>
  `).join('');

  const leadinHtml = showLeadin
    ? `<div class="leadin"><span class="you-said">You said —</span> <span class="echo">${lastEntry.echo}</span></div>`
    : '';

  app.innerHTML = `
    <div class="topbar">
      <div class="brand">Question ${state.history.length + 1} <span class="dot">/</span> ${MAX_QUESTIONS}</div>
      <div class="progress" aria-hidden="true">${renderProgress()}</div>
    </div>
    <div class="stage">
      <div class="scene ${directionClass}">
        ${leadinHtml}
        <div class="qprompt">${q.prompt}</div>
        <div class="options">${optsHtml}</div>
      </div>
    </div>
    <div class="bottombar">
      <button class="back-btn ${state.history.length === 0 ? 'hidden' : ''}" id="back-btn">
        <span class="arrow">←</span> Back
      </button>
      <div class="foot-note">Tap to continue</div>
    </div>
  `;

  // wire up options
  document.querySelectorAll('.opt').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const idx = parseInt(btn.dataset.idx, 10);
      handleAnswer(q, idx, btn);
    });
  });

  // back button
  const backBtn = document.getElementById('back-btn');
  if (backBtn) backBtn.addEventListener('click', goBack);
}

function handleAnswer(q, idx, btnEl) {
  // prevent double-tap
  if (state._locked) return;
  state._locked = true;

  // tap effect
  btnEl.classList.add('tapped');
  // haptic if supported
  if (navigator.vibrate) { try { navigator.vibrate(8); } catch(_) {} }

  const opt = q.options[idx];
  // apply effects
  Object.keys(opt.effects).forEach(t => state.scores[t] += opt.effects[t]);
  state.history.push({ qId: q.id, optionIdx: idx, echo: opt.echo, effects: { ...opt.effects } });
  state.direction = 'forward';

  // small delay for visual feedback then advance
  setTimeout(() => {
    state._locked = false;
    renderQuestion();
  }, 280);
}

function goBack() {
  if (state.history.length === 0) return;
  const last = state.history.pop();
  // remove from asked so it could be re-asked (Q1/Q2 are deterministic anyway)
  const askedIdx = state.asked.indexOf(last.qId);
  // We pop the most recent asked entry — only if it was the most recent
  if (askedIdx === state.asked.length - 1) state.asked.splice(askedIdx, 1);
  // undo effects
  Object.keys(last.effects).forEach(t => state.scores[t] -= last.effects[t]);
  state.direction = 'back';
  renderQuestion();
}

/* ============================================================
   RESULT
   ============================================================ */
function renderResult() {
  const sorted = topTraits(state.scores);
  const archetypeKey = determineArchetype(state.scores);
  const arche = ARCHETYPES[archetypeKey];
  const secondKey = sorted[0] === archetypeKey ? sorted[1] : sorted[0];
  const secondArche = ARCHETYPES[secondKey];

  const maxScore = Math.max(1, ...Object.values(state.scores));

  const barsHtml = sorted.map(t => {
    const pct = Math.round((state.scores[t] / maxScore) * 100);
    const isTop = t === archetypeKey;
    const isSecond = t === secondKey;
    return `
      <div class="bar-row">
        <div class="name ${isTop ? 'top' : isSecond ? 'second' : ''}">${TRAIT_LABELS[t]}</div>
        <div class="bar-track"><div class="bar-fill ${isTop ? 'top' : ''}" style="width: ${pct}%"></div></div>
        <div class="pct">${state.scores[t]}</div>
      </div>
    `;
  }).join('');

  const strengthsHtml = arche.strengths.map(s => `
    <div class="strength"><div class="check">✓</div><div>${s}</div></div>
  `).join('');

  const stepsHtml = arche.nextSteps.map((s,i) => `
    <div class="step"><div class="num">${i+1}</div><div>${s}</div></div>
  `).join('');

  app.innerHTML = `
    <div class="topbar" id="print-hide">
      <div class="brand">Sev<span class="dot">.</span> Next Step Quiz</div>
      <div class="progress" aria-hidden="true">${
        Array(MAX_QUESTIONS).fill(0).map(() => '<div class="pip done"></div>').join('')
      }</div>
    </div>
    <div class="stage">
      <div class="scene fade result">
        <div>
          <div class="crown">Your next step looks like</div>
          <h1>${arche.name}</h1>
        </div>
        <div class="tagline">${arche.headline}</div>

        <div>
          <div class="section-title">What you've got going for you</div>
          <div class="strengths">${strengthsHtml}</div>
        </div>

        <div>
          <div class="section-title">Your next 3 moves</div>
          <div class="steps">${stepsHtml}</div>
        </div>

        <div class="first-action">
          <div class="label">First action — do this today</div>
          <div class="body">${arche.firstAction}</div>
        </div>

        <div>
          <div class="section-title">How your answers stacked up</div>
          <div class="bars">${barsHtml}</div>
        </div>

        <div class="runner-up">
          You also showed strong <strong>${TRAIT_LABELS[secondKey]}</strong> energy — most people are a primary plus a secondary. Lean into the top one first, but don't ignore the second.
        </div>

        <div class="result-actions" id="print-hide-actions">
          <button class="btn-primary" id="save-btn">
            <span>Save my result</span>
          </button>
          <button class="btn-secondary" id="restart-btn">
            <span>Start over</span>
          </button>
        </div>
      </div>
    </div>
  `;

  document.getElementById('save-btn').addEventListener('click', () => {
    // Use the print dialog — on iPad, this opens the share sheet → "Save to Files" or "AirDrop" as PDF
    document.title = `Next-Step-Result-${arche.name.replace(/[^a-zA-Z0-9]/g,'-')}`;
    window.print();
    // restore title after a moment
    setTimeout(() => { document.title = "What's Your Next Step? — A 60-second street quiz"; }, 1500);
  });

  document.getElementById('restart-btn').addEventListener('click', () => {
    fresh();
    renderWelcome();
  });
}

/* ============================================================
   BOOT
   ============================================================ */
fresh();
renderWelcome();
</script>
</body>
</html>
