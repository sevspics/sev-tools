kshop.","options":[{"label":"Strategy → CMO","next":"pitch_cmo"},{"label":"Consistency → Workshop","next":"pitch_workshop"}]},"qualify_dfy":{"id":"qualify_dfy","tab":"Call","title":"Wants Someone to Handle It","tactic":"Label + Anchor Upsell","voss":"Label what they're after. Then go straight to CMO — Hormozi anchor upsell.","script":"It sounds like you want the result without the learning curve — you'd rather have someone who knows what they're doing in your corner. Is that right? [wait] Yeah, that makes sense.","note":"Confirm they want DFY before pitching. Then lead with CMO.","options":[{"label":"Yes → pitch CMO","next":"pitch_cmo"},{"label":"They still want to learn → workshop","next":"pitch_workshop"}]},"pitch_workshop":{"id":"pitch_workshop","tab":"Pitch","title":"Workshop Pitch — Value Stack","tactic":"Hormozi Value Stack then Price Reveal","voss":"Stack everything they get before you say a number.","script":"Okay so here's what the workshop is. It's two half-days online with a week in between. By end of day one you've got your full content system built — your brand DNA locked in, 20-plus video ideas scripted, and your first videos filmed. Day two is editing and publishing. You leave with 10 videos ready to go live and a system you actually understand and own. [pause] On top of that, you get 30 days of direct access to me after — WhatsApp, accountability, I review what you're putting out. That's included. [pause] The investment for all of that is $1,500.","note":"Say $1,500 and stop. Don't justify it. Let them respond.","options":[{"label":"I'm in","next":"close_workshop"},{"label":"Can't afford it","next":"cant_afford"},{"label":"Need to think about it","next":"think_about"},{"label":"Need to talk to partner","next":"partner"},{"label":"Not sure it'll work","next":"not_sure"},{"label":"Already using an agency","next":"agency"}]},"pitch_cmo":{"id":"pitch_cmo","tab":"Pitch","title":"CMO Pitch — Anchor High","tactic":"Hormozi Anchor Upsell","voss":"Lead with the highest offer first. If they balk, move down to workshop.","script":"Based on what you're describing, honestly the workshop might be a step below where you need to be. What sounds like a better fit is the advisory side. I become your fractional CMO — weekly call with me, WhatsApp access anytime during business hours, I build your content system with you, I oversee whoever you've got doing creative, and we make sure the strategy is actually working. [pause] That's $2,500 a month.","note":"Say the price and let the silence sit.","options":[{"label":"Tell me more","next":"cmo_detail"},{"label":"That's too much","next":"cmo_too_much"},{"label":"I'm interested","next":"close_cmo"},{"label":"Need to think about it","next":"think_about"},{"label":"Need to talk to partner","next":"partner"}]},"cmo_detail":{"id":"cmo_detail","tab":"Pitch","title":"CMO — More Detail","tactic":"Value Elaboration","voss":"Spell out the deliverables clearly.","script":"Every week we've got a one-hour call. Non-compulsory because schedules move, but it's there. In between, I'm on WhatsApp. I also build your content system with you and stay across whatever creative team you've got. Three-month minimum — after that it goes month-to-month, cancel anytime.","note":"Minimum commitment = 3 months = $7,500 total. Say it clearly.","options":[{"label":"Okay, let's do it","next":"close_cmo"},{"label":"That's too much","next":"cmo_too_much"},{"label":"Need to think about it","next":"think_about"}]},"cmo_too_much":{"id":"cmo_too_much","tab":"Pitch","title":"CMO Too Expensive — Bridge to Workshop","tactic":"Hormozi Feature Downsell","voss":"Don't drop the price — change the offer.","script":"That's fair — the advisory is the full-service version. If that feels like too big a step right now, the workshop might actually be the smarter move. You spend two half-days with me, build the whole system yourself, and walk away knowing exactly what needs to happen. Then if you want me in your corner after that, we can have that conversation. [pause] The workshop is $1,500. Better fit right now?","note":"Reframe workshop as the smart entry point, not consolation prize.","options":[{"label":"Yes, let's do workshop","next":"close_workshop"},{"label":"Still too much","next":"cant_afford"},{"label":"Need to think","next":"think_about"}]},"close_workshop":{"id":"close_workshop","tab":"Close","title":"Close — This or That","tactic":"Voss This-or-That Close","voss":"Never ask 'do you want to book?' Two specific options only.","script":"Perfect. Two options — we can lock in your spot right now and I'll send you the payment link while we're on the call, or I can send it through and you sort it in the next 24 hours. Which works better?","note":"Send the payment link during the call if they say 'now'.","options":[{"label":"Lock it in now","next":"END_BOOKED_WORKSHOP"},{"label":"Send it through","next":"payment_link"},{"label":"Wait, I have a question","next":"think_about"}]},"close_cmo":{"id":"close_cmo","tab":"Close","title":"Close CMO","tactic":"This-or-That Close + Commitment Frame","voss":"Same close structure. Confirm start date so it feels real.","script":"Great. Minimum is three months — that's enough time to actually build something and see results. Two options — we sort out the first payment now and lock in a start date, or you need a day or two. Which works better?","note":"Get a start date even if payment comes later.","options":[{"label":"Let's sort it now","next":"END_BOOKED_CMO"},{"label":"Give me a couple days","next":"payment_link"},{"label":"Still have questions","next":"cmo_detail"}]},"cant_afford":{"id":"cant_afford","tab":"Objection","title":"Can't Afford It — Diagnose","tactic":"Voss Calibrated Question","voss":"Find out if it's money or value first.","script":"Help me understand — is it that the money genuinely isn't there right now, or is it more that you haven't seen enough yet to feel confident it's going to work?","note":"Stay quiet. The answer tells you everything.","options":[{"label":"Money isn't there","next":"money_genuine"},{"label":"Not confident it'll work","next":"value_issue"}]},"money_genuine":{"id":"money_genuine","tab":"Objection","title":"Money Isn't There — Payment Plan","tactic":"Hormozi Payment Plan Downsell","voss":"Same product, same price, different timing.","script":"Okay, fair. Here's one thing I can do — we break it into three payments of $500. First one today locks your spot, the other two over the next two months. Does that work?","note":"Present it matter-of-factly.","options":[{"label":"Yes, that works","next":"close_workshop"},{"label":"Still too much at $500","next":"downsell_session"},{"label":"Need to think","next":"think_about"}]},"value_issue":{"id":"value_issue","tab":"Objection","title":"Not Confident — De-Risk It","tactic":"Hormozi Trial Downsell + Voss Label","voss":"Label their hesitation before offering the solution.","script":"That makes complete sense — you don't know me yet. So here's what I'd suggest. Book a single session with me. One hour, $350. We go through your specific business — I show you exactly what your content system would look like. You walk away with a full plan. If it's useful, you'll know whether the workshop makes sense. If not, you're out $350 and an hour. Lower risk?","note":"$350 session as proof-of-concept. Most people come back for the workshop.","options":[{"label":"Yes, let's do the session","next":"close_session"},{"label":"Even $350 is too much","next":"graceful_exit"},{"label":"I'll think about it","next":"think_about"}]},"downsell_session":{"id":"downsell_session","tab":"Objection","title":"Last Offer — $350 Session","tactic":"Hormozi Feature Downsell — Last Line","voss":"This is the floor. If they say no, let them go cleanly.","script":"Last thing I'll offer — one strategy session with me, $350. One hour, your business. You walk away with a plan. Want to lock that in?","note":"Offer once. If no, graceful exit.","options":[{"label":"Yes, let's do it","next":"close_session"},{"label":"No, not today","next":"graceful_exit"}]},"close_session":{"id":"close_session","tab":"Close","title":"Close — $350 Session","tactic":"This-or-That Close","voss":"Same structure. Make it easy.","script":"Great. Two options — I send you the link now and we lock in a time, or I send it through and you book in the next 24 hours. Which works?","note":"Send the booking link. Have it ready.","options":[{"label":"Lock it in now","next":"END_BOOKED_SESSION"},{"label":"Send it through","next":"payment_link"}]},"think_about":{"id":"think_about","tab":"Objection","title":"Need to Think About It","tactic":"Voss Calibrated Question","voss":"'Think about it' is never the real objection. Surface the actual blocker.","script":"Of course. What's the main thing you'd need to feel clearer on before making a call?","note":"Stay quiet. Their answer tells you which branch to go down.","options":[{"label":"The money","next":"cant_afford"},{"label":"Time — too busy","next":"time_objection"},{"label":"Want to research more","next":"research"},{"label":"Not sure it'll work","next":"not_sure"},{"label":"Need to talk to partner","next":"partner"}]},"time_objection":{"id":"time_objection","tab":"Objection","title":"Too Busy","tactic":"Voss Label + Reframe","voss":"Being busy is the symptom, not having a system is the disease.","script":"It sounds like the business is actually going really well — which usually means now is when getting visible matters most. [pause] The workshop is two half-days. That's the investment that builds the system that takes stuff off your plate. I only run one cohort a month. Next one is [DATE]. After that it's another month out. Does that date work?","note":"Create real urgency — spots capped, dates fixed.","options":[{"label":"That date works","next":"close_workshop"},{"label":"Neither date works","next":"payment_link"},{"label":"Still not sure","next":"research"}]},"research":{"id":"research","tab":"Objection","title":"Wants to Research More","tactic":"Voss No Orientation + Scarcity","voss":"Give them permission to say no — it opens them up.","script":"Totally understand — and I'd rather you feel completely sure. [pause] Spots are capped at 10 per cohort and [X] are filled for [DATE]. I'm not going to chase you. What would help you make the call — seeing what past students said, or something specific about how it works?","note":"Answer their specific question, then go back to close.","options":[{"label":"Want testimonials","next":"proof_close"},{"label":"Specific question","next":"specific_q"},{"label":"Just need to sit with it","next":"graceful_exit"}]},"proof_close":{"id":"proof_close","tab":"Objection","title":"Social Proof then Re-close","tactic":"Hormozi Proof + Re-close","voss":"Share proof, then re-close immediately.","script":"Let me tell you about [client name]. [Share relevant case study — 3-4 sentences.] The system works. The question is just whether now is the right time. Workshop — two half-days, $1,500, next one is [DATE]. Want to lock it in?","note":"Keep case study to 3-4 sentences. Close immediately after.","options":[{"label":"Yes, lock it in","next":"close_workshop"},{"label":"Still need time","next":"graceful_exit"}]},"specific_q":{"id":"specific_q","tab":"Objection","title":"Specific Question","tactic":"Listen then Answer then Re-close","voss":"Answer directly. No filler. Then re-close.","script":"Go for it — what's the question?","note":"Listen. Answer. Then: 'Does that answer it? So — workshop, [DATE], $1,500. Want to lock it in?'","options":[{"label":"Question answered, keen","next":"close_workshop"},{"label":"Led to another concern","next":"think_about"}]},"partner":{"id":"partner","tab":"Objection","title":"Need to Talk to Partner","tactic":"Voss 3-Way Call","voss":"Offer to be on the call with the partner — you close them directly.","script":"Completely makes sense to loop them in. Two options — I jump on a quick call with both of you, 20 minutes, or I send you something they can look through. Which is easier?","note":"The 3-way call is gold.","options":[{"label":"3-way call","next":"close_3way"},{"label":"Send them info","next":"payment_link"}]},"close_3way":{"id":"close_3way","tab":"Close","title":"Schedule 3-Way Call","tactic":"This-or-That Close","voss":"Get a specific time locked in.","script":"Two times that work for me — [DAY/TIME 1] or [DAY/TIME 2]. Which works for both of you?","note":"Get a time. Send calendar invite immediately.","options":[{"label":"Time locked in","next":"payment_link"},{"label":"Send info instead","next":"payment_link"}]},"not_sure":{"id":"not_sure","tab":"Objection","title":"Not Sure It'll Work","tactic":"Voss Calibrated Question + Hormozi Trial","voss":"Ask what specifically worries them, then address it.","script":"What is it about your business that makes you think it might not translate?","note":"Let them explain. Label their concern. Then offer $350 session.","options":[{"label":"Address concern → session","next":"value_issue"},{"label":"Niche you've worked with → proof","next":"proof_close"},{"label":"Concern is time/effort","next":"time_objection"}]},"agency":{"id":"agency","tab":"Objection","title":"Already Using an Agency","tactic":"Voss Label + Reframe","voss":"Don't attack the agency. Introduce the ownership reframe.","script":"It sounds like you've got people on it but something's not quite landing. [wait] Here's the thing with agencies — when they're done, they take the system with them. The workshop gives you the system. You own it. Does that distinction make sense?","note":"Let them respond before pitching.","options":[{"label":"Interested in workshop","next":"pitch_workshop"},{"label":"More interested in CMO","next":"pitch_cmo"},{"label":"Happy with agency","next":"graceful_exit"}]},"graceful_exit":{"id":"graceful_exit","tab":"Close","title":"Graceful Exit — Leave Door Open","tactic":"Voss Clean Close + Future Anchor","voss":"Never burn a bridge. The no today is often a yes in 3 months.","script":"Completely understand — not every timing is right. I'll send you a quick overview so you've got it when the time does make sense. Best way to stay across what I'm doing is @talktosev on Instagram and YouTube. When things shift, you know where to find me.","note":"Send overview email immediately. Follow up in 30 days.","options":[{"label":"Send follow-up","next":"END_FOLLOW_UP"},{"label":"Changed their mind","next":"think_about"}]},"payment_link":{"id":"payment_link","tab":"Done","title":"Send Payment Link — 24hr Follow-up","tactic":"Soft Hold + Deadline","voss":"Create a soft deadline.","script":"No problem. I'll send it through now. The spot isn't locked until payment goes through, and I do have people who've shown interest for [DATE]. If you can sort it within 24 hours that'd be great. Sound good?","note":"Send payment link immediately. Follow up in 24 hours.","options":[{"label":"They'll pay — follow up tomorrow","next":"END_FOLLOW_UP"},{"label":"Went cold — email sequence","next":"END_FOLLOW_UP"}]},"END_BOOKED_WORKSHOP":{"id":"END_BOOKED_WORKSHOP","tab":"Done","title":"Workshop Booked — $1,500","tactic":"","voss":"","script":"Log as Workshop Booked. Send confirmation + Zoom link + pre-brief within the hour.","note":"","options":[]},"END_BOOKED_CMO":{"id":"END_BOOKED_CMO","tab":"Done","title":"CMO Booked — $2,500/mo","tactic":"","voss":"","script":"Log as CMO Booked. Send invoice + onboarding call link within the hour.","note":"","options":[]},"END_BOOKED_SESSION":{"id":"END_BOOKED_SESSION","tab":"Done","title":"Session Booked — $350","tactic":"","voss":"","script":"Log as Session Booked. Send intake form. Prepare to upsell workshop.","note":"","options":[]},"END_FOLLOW_UP":{"id":"END_FOLLOW_UP","tab":"Done","title":"Follow-up Required","tactic":"","voss":"","script":"Send overview email now. Follow up in 24 hours. If no response in 48 hours, send: 'Hey [Name] — Sev here. Have you completely moved on from sorting your content, or is it still something you're thinking about?'","note":"","options":[]}};

let salesScene = 'open';
let salesHistory = [];

function goSalesScene(nextId) {
  const p = getProject(currentProjectId);
  if (!p) return;
  salesHistory.push(salesScene);
  salesScene = nextId;
  if (nextId.startsWith('END_')) {
    p.stage0_sales.outcome = SALES_SCENES[nextId].title;
    p.stage0_sales.decisionPath = [...salesHistory, nextId];
    save();
  }
  document.getElementById('main-content').innerHTML = renderSales(p);
}

function goSalesBack() {
  if (salesHistory.length === 0) return;
  salesScene = salesHistory.pop();
  const p = getProject(currentProjectId);
  document.getElementById('main-content').innerHTML = renderSales(p);
}

function resetSalesAdventure() {
  salesScene = 'open';
  salesHistory = [];
  const p = getProject(currentProjectId);
  document.getElementById('main-content').innerHTML = renderSales(p);
}

function saveSalesField(field, value) {
  const p = getProject(currentProjectId);
  if (!p) return;
  p.stage0_sales[field] = value;
  save();
}

function renderSales(p) {
  const s0 = p.stage0_sales;
  const scene = SALES_SCENES[salesScene];
  const isEnd = salesScene.startsWith('END_');
  const clientName = p.meta.clientName || 'Client';
  const firstName = clientName.split(' ')[0];

  let html = '<div class="card mb-16" style="padding:20px">';
  html += '<div class="flex-between mb-16"><div style="font-family:\'DM Mono\',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)">Lead Info</div></div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
  html += `<div class="form-group"><label class="form-label">Lead Source</label><input class="input" value="${esc(s0.leadSource || '')}" onchange="saveSalesField('leadSource',this.value)" placeholder="Instagram DM, referral, website..."></div>`;
  html += `<div class="form-group"><label class="form-label">Lead Date</label><input class="input" type="date" value="${esc(s0.leadDate || '')}" onchange="saveSalesField('leadDate',this.value)"></div>`;
  html += '</div>';
  html += `<div class="form-group"><label class="form-label">Pre-Call Notes</label><textarea class="textarea" rows="2" onchange="saveSalesField('callNotes',this.value)" placeholder="Anything to know before the call...">${esc(s0.callNotes || '')}</textarea></div>`;
  if (s0.outcome) {
    html += `<div style="margin-top:8px;padding:8px 12px;background:var(--green-dim);border:1px solid var(--green);border-radius:6px;font-size:13px;color:var(--green)">Outcome: ${esc(s0.outcome)}</div>`;
  }
  html += '</div>';

  if (salesHistory.length > 0) {
    html += '<div style="display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap">';
    salesHistory.forEach((sid, i) => {
      const sc = SALES_SCENES[sid];
      html += `<span style="font-size:11px;color:var(--dim);cursor:pointer;text-decoration:underline" onclick="salesScene='${sid}';salesHistory=salesHistory.slice(0,${i});document.getElementById('main-content').innerHTML=renderSales(getProject(currentProjectId))">${esc(sc ? sc.title : sid)}</span>`;
      html += '<span style="color:var(--dim);font-size:10px">&rarr;</span>';
    });
    html += `<span style="font-size:11px;color:var(--gold);font-weight:600">${esc(scene.title)}</span>`;
    html += '</div>';
  }

  const borderColor = isEnd ? 'var(--green)' : scene.tab === 'Objection' ? 'var(--red)' : scene.tab === 'Pitch' ? 'var(--purple)' : scene.tab === 'Close' ? 'var(--gold)' : 'var(--border)';
  html += `<div class="card" style="border-color:${borderColor};padding:20px">`;

  const tabColors = { Call: 'var(--cyan)', Pitch: 'var(--purple)', Objection: 'var(--red)', Close: 'var(--gold)', Done: 'var(--green)' };
  const tc = tabColors[scene.tab] || 'var(--dim)';
  html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">`;
  html += `<span style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:4px;background:color-mix(in srgb,${tc} 15%,transparent);color:${tc}">${esc(scene.tab)}</span>`;
  html += `<span style="font-weight:700;font-size:16px">${esc(scene.title)}</span>`;
  html += '</div>';

  if (scene.tactic) {
    html += `<div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);margin-bottom:8px">${esc(scene.tactic)}</div>`;
    html += `<div style="font-size:12px;color:var(--dim);margin-bottom:16px;font-style:italic;line-height:1.5">${esc(scene.voss)}</div>`;
  }

  const scriptText = scene.script.replace(/\[Name\]/g, firstName);
  html += `<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px;font-size:13px;line-height:1.7;white-space:pre-wrap">${esc(scriptText)}</div>`;

  if (scene.note) {
    html += `<div style="font-size:12px;color:var(--yellow);margin-bottom:16px;padding:8px 12px;background:var(--yellow-dim);border-radius:6px">${esc(scene.note)}</div>`;
  }

  if (scene.options.length > 0) {
    html += '<div style="display:flex;flex-direction:column;gap:8px">';
    scene.options.forEach(opt => {
      const nextScene = SALES_SCENES[opt.next];
      const optColor = nextScene && nextScene.tab === 'Done' ? 'var(--green)' : nextScene && nextScene.tab === 'Objection' ? 'var(--red)' : nextScene && nextScene.tab === 'Close' ? 'var(--gold)' : 'var(--cyan)';
      html += `<button onclick="goSalesScene('${opt.next}')" style="text-align:left;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;transition:border-color 0.2s" onmouseover="this.style.borderColor='${optColor}'" onmouseout="this.style.borderColor='var(--border)'">${esc(opt.label)}</button>`;
    });
    html += '</div>';
  }

  if (isEnd) {
    html += `<div style="margin-top:16px;text-align:center">`;
    html += `<button class="btn btn-gold" onclick="resetSalesAdventure()">Start New Call</button>`;
    html += '</div>';
  }

  html += '</div>';

  html += '<div style="display:flex;gap:8px;margin-top:12px">';
  if (salesHistory.length > 0) html += `<button class="btn btn-outline" onclick="goSalesBack()">&larr; Back</button>`;
  html += `<button class="btn btn-outline" onclick="resetSalesAdventure()" style="margin-left:auto">Reset</button>`;
  html += '</div>';

  html += '<div class="card mt-16" style="padding:16px">';
  html += '<div style="font-family:\'DM Mono\',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:8px">Call Notes</div>';
  html += `<textarea class="textarea" rows="4" onchange="saveSalesField('notes',this.value)" placeholder="Notes during the call...">${esc(s0.notes || '')}</textarea>`;
  html += '</div>';

  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px">';
  html += '<div class="card" style="padding:16px">';
  html += '<div style="font-family:\'DM Mono\',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--green);margin-bottom:8px">Buy Signals</div>';
  html += `<textarea class="textarea" rows="3" onchange="saveSalesField('buySignals',this.value.split('\\n').filter(l=>l.trim()))" placeholder="One per line...">${Array.isArray(s0.buySignals) ? s0.buySignals.join('\\n') : ''}</textarea>`;
  html += '</div>';
  html += '<div class="card" style="padding:16px">';
  html += '<div style="font-family:\'DM Mono\',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--red);margin-bottom:8px">Objections</div>';
  html += `<textarea class="textarea" rows="3" onchange="saveSalesField('objections',this.value.split('\\n').filter(l=>l.trim()))" placeholder="One per line...">${Array.isArray(s0.objections) ? s0.objections.join('\\n') : ''}</textarea>`;
  html += '</div></div>';

  return html;
}

const DISC_TOTAL_Q = 38;

let discSection = 'opening';

function switchDiscSection(sectionId) {
  discSection = sectionId;
  const p = getProject(currentProjectId);
  document.getElementById('main-content').innerHTML = renderDiscovery(p);
}

function saveDiscAnswer(num, value) {
  const p = getProject(currentProjectId);
  if (!p) return;
  p.stage1_discovery.questionnaire.answers['q' + num] = value;
  save();
}

function saveDiscAdvisorNote(id, value) {
  const p = getProject(currentProjectId);
  if (!p) return;
  p.stage1_discovery.questionnaire.advisorNotes[id] = value;
  save();
}

function saveDiscField(field, value) {
  const p = getProject(currentProjectId);
  if (!p) return;
  const parts = field.split('.');
  let obj = p.stage1_discovery;
  for (let i = 0; i < parts.length - 1; i++) obj = obj[parts[i]];
  obj[parts[parts.length - 1]] = value;
  save();
}

function pullFromDiscovery() {
  const p = getProject(currentProjectId);
  if (!p) return;
  const ext = p.stage1_discovery.extractedDetails;
  const h = p.stage2_preproduction.header;
  if (ext.shootDate) h.date = ext.shootDate;
  if (ext.timeRange) h.timeRange = ext.timeRange;
  if (ext.crew.lead) h.crew.lead = ext.crew.lead;
  if (ext.crew.second) h.crew.second = ext.crew.second;
  h.clientName = p.meta.clientName || h.clientName;
  h.shootType = p.meta.shootType || h.shootType;
  save();
  toast('Shot list header updated from Discovery');
  switchProjectTab('shotlist', null);
  document.querySelectorAll('#project-tabs .tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'shotlist'));
}

function renderDiscovery(p) {
  const s1 = p.stage1_discovery;
  const answers = s1.questionnaire.answers || {};
  const advNotes = s1.questionnaire.advisorNotes || {};

  let totalAnswered = 0;
  for (let i = 1; i <= DISC_TOTAL_Q; i++) { if ((answers['q' + i] || '').trim()) totalAnswered++; }
  const pct = Math.round((totalAnswered / DISC_TOTAL_Q) * 100);

  let html = '';

  html += '<div class="card mb-16" style="padding:20px">';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">';
  html += `<div class="form-group"><label class="form-label">Meeting Date</label><input class="input" type="date" value="${esc(s1.meetingDate || '')}" onchange="saveDiscField('meetingDate',this.value)"></div>`;
  html += `<div class="form-group"><label class="form-label">Fathom Recording ID</label><input class="input" value="${esc(s1.fathomRecordingId || '')}" onchange="saveDiscField('fathomRecordingId',this.value)" placeholder="Paste Fathom ID..."></div>`;
  html += '</div>';
  html += `<div class="form-group"><label class="form-label">Fathom Summary</label><textarea class="textarea" rows="3" onchange="saveDiscField('fathomSummary',this.value)" placeholder="Paste Fathom meeting summary here or use Claude Code to auto-populate...">${esc(s1.fathomSummary || '')}</textarea></div>`;
  html += `<div class="form-group"><label class="form-label">Fathom Transcript</label><textarea class="textarea" rows="3" onchange="saveDiscField('fathomTranscript',this.value)" placeholder="Paste full transcript here...">${esc(s1.fathomTranscript || '')}</textarea></div>`;
  html += '</div>';

  html += `<div class="card mb-16" style="padding:16px">`;
  html += `<div class="flex-between mb-8"><span style="font-size:13px;font-weight:600">Questionnaire Progress</span><span style="font-family:'DM Mono',monospace;font-size:12px;color:var(--dim)">${totalAnswered} / ${DISC_TOTAL_Q}</span></div>`;
  html += `<div style="height:6px;background:var(--bg);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--gold);border-radius:3px;transition:width 0.3s"></div></div>`;
  html += '</div>';

  html += '<div style="display:flex;overflow-x:auto;gap:4px;margin-bottom:16px;padding-bottom:4px">';
  DISC_SECTIONS.forEach(sec => {
    let sAnswered = 0;
    sec.questions.forEach(q => { if ((answers['q' + q.num] || '').trim()) sAnswered++; });
    const isActive = discSection === sec.id;
    const hasAns = sAnswered > 0;
    html += `<button onclick="switchDiscSection('${sec.id}')" style="flex:0 0 auto;padding:6px 12px;border-radius:6px;font-size:11px;font-weight:${isActive ? '700' : '400'};white-space:nowrap;border:1px solid ${isActive ? 'var(--gold)' : 'var(--border)'};background:${isActive ? 'var(--gold-dim)' : 'var(--bg2)'};color:${isActive ? 'var(--gold)' : hasAns ? 'var(--text)' : 'var(--dim)'};cursor:pointer">${esc(sec.title)} <span style="font-family:'DM Mono',monospace;font-size:10px;opacity:0.7">${sAnswered}/${sec.questions.length}</span></button>`;
  });
  html += '</div>';

  const sec = DISC_SECTIONS.find(s => s.id === discSection);
  if (sec) {
    html += `<div style="font-size:11px;color:var(--dim);margin-bottom:4px;font-family:'DM Mono',monospace">${sec.time}</div>`;
    html += `<div style="font-size:18px;font-weight:700;margin-bottom:16px">${esc(sec.title)}</div>`;

    sec.questions.forEach(q => {
      const val = answers['q' + q.num] || '';
      const answered = val.trim() !== '';
      html += `<div class="card mb-12" style="padding:16px;border-color:${answered ? 'var(--gold-dim)' : 'var(--border)'}">`;
      html += `<div style="display:flex;gap:8px;margin-bottom:8px"><span style="font-family:'DM Mono',monospace;font-size:11px;color:${answered ? 'var(--gold)' : 'var(--dim)'}">Q${q.num}</span><span style="font-size:13px;font-weight:500">${esc(q.text)}</span></div>`;
      if (q.hint) html += `<div style="font-size:11px;color:var(--dim);font-style:italic;margin-bottom:8px">${esc(q.hint)}</div>`;
      html += `<textarea class="textarea" rows="2" onchange="saveDiscAnswer(${q.num},this.value)" placeholder="Answer...">${esc(val)}</textarea>`;
      html += '</div>';
    });

    if (sec.advisorNotes) {
      html += `<div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border)">`;
      html += `<div style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--purple);margin-bottom:12px">Advisor Notes (Internal)</div>`;
      sec.advisorNotes.forEach(an => {
        const val = advNotes[an.id] || '';
        html += `<div class="card mb-12" style="padding:14px;border-color:${val.trim() ? 'var(--purple-dim)' : 'var(--border)'}">`;
        html += `<div style="font-size:13px;font-weight:500;margin-bottom:4px">${esc(an.text)}</div>`;
        if (an.hint) html += `<div style="font-size:11px;color:var(--dim);font-style:italic;margin-bottom:6px">${esc(an.hint)}</div>`;
        html += `<textarea class="textarea" rows="1" onchange="saveDiscAdvisorNote('${an.id}',this.value)" placeholder="Notes...">${esc(val)}</textarea>`;
        html += '</div>';
      });
      html += '</div>';
    }

    const secIdx = DISC_SECTIONS.findIndex(s => s.id === discSection);
    html += '<div style="display:flex;gap:8px;margin-top:16px">';
    if (secIdx > 0) html += `<button class="btn btn-outline" onclick="switchDiscSection('${DISC_SECTIONS[secIdx - 1].id}')">&larr; ${esc(DISC_SECTIONS[secIdx - 1].title)}</button>`;
    if (secIdx < DISC_SECTIONS.length - 1) html += `<button class="btn btn-outline" style="margin-left:auto" onclick="switchDiscSection('${DISC_SECTIONS[secIdx + 1].id}')">${esc(DISC_SECTIONS[secIdx + 1].title)} &rarr;</button>`;
    html += '</div>';
  }

  html += '<div class="card mt-16" style="padding:20px">';
  html += '<div class="flex-between mb-12"><div style="font-family:\'DM Mono\',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)">Extracted Details</div>';
  html += '<button class="btn btn-gold btn-sm" onclick="pullFromDiscovery()">&rarr; Push to Shot List</button></div>';
  const ext = s1.extractedDetails;
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
  html += `<div class="form-group"><label class="form-label">Shoot Date</label><input class="input" type="date" value="${esc(ext.shootDate || '')}" onchange="saveDiscField('extractedDetails.shootDate',this.value)"></div>`;
  html += `<div class="form-group"><label class="form-label">Time Range</label><input class="input" value="${esc(ext.timeRange || '')}" onchange="saveDiscField('extractedDetails.timeRange',this.value)" placeholder="e.g. 7:00 AM - 2:00 PM"></div>`;
  html += `<div class="form-group"><label class="form-label">Lead Shooter</label><input class="input" value="${esc(ext.crew.lead || '')}" onchange="saveDiscField('extractedDetails.crew.lead',this.value)"></div>`;
  html += `<div class="form-group"><label class="form-label">Second Shooter</label><input class="input" value="${esc(ext.crew.second || '')}" onchange="saveDiscField('extractedDetails.crew.second',this.value)"></div>`;
  html += '</div>';
  html += `<div class="form-group"><label class="form-label">Deliverables</label><textarea class="textarea" rows="2" onchange="saveDiscField('extractedDetails.deliverables',this.value.split('\\n').filter(l=>l.trim()))" placeholder="One per line...">${Array.isArray(ext.deliverables) ? ext.deliverables.join('\\n') : ''}</textarea></div>`;
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
  html += `<div class="form-group"><label class="form-label">Talent / On-Camera</label><textarea class="textarea" rows="2" onchange="saveDiscField('extractedDetails.talentNames',this.value.split('\\n').filter(l=>l.trim()))" placeholder="One per line...">${Array.isArray(ext.talentNames) ? ext.talentNames.join('\\n') : ''}</textarea></div>`;
  html += `<div class="form-group"><label class="form-label">Locations</label><textarea class="textarea" rows="2" onchange="saveDiscField('extractedDetails.locations',this.value.split('\\n').filter(l=>l.trim()))" placeholder="One per line...">${Array.isArray(ext.locations) ? ext.locations.join('\\n') : ''}</textarea></div>`;
  html += '</div>';
  html += `<div class="form-group"><label class="form-label">Compliance / AHPRA Flags</label><textarea class="textarea" rows="1" onchange="saveDiscField('extractedDetails.complianceFlags',this.value.split('\\n').filter(l=>l.trim()))" placeholder="Any compliance notes...">${Array.isArray(ext.complianceFlags) ? ext.complianceFlags.join('\\n') : ''}</textarea></div>`;
  html += '</div>';

  return html;
}

function savePostField(field, value) {
  const p = getProject(currentProjectId);
  if (!p) return;
  p.stage4_post[field] = value;
  save();
}

function addDeliverable() {
  const p = getProject(currentProjectId);
  if (!p) return;
  p.stage4_post.deliverables.push({
    id: uid(), name: '', type: 'hero', status: 'not-started',
    shotIds: [], notes: '', editorAssigned: ''
  });
  save();
  document.getElementById('main-content').innerHTML = renderPost(p);
}

function updateDeliverable(idx, field, value) {
  const p = getProject(currentProjectId);
  if (!p) return;
  p.stage4_post.deliverables[idx][field] = value;
  save();
}

function removeDeliverable(idx) {
  const p = getProject(currentProjectId);
  if (!p) return;
  p.stage4_post.deliverables.splice(idx, 1);
  save();
  document.getElementById('main-content').innerHTML = renderPost(p);
}

function addFileMapping() {
  const p = getProject(currentProjectId);
  if (!p) return;
  p.stage4_post.fileMapping.push({ fileName: '', shotId: '', timestamp: '', confirmed: false });
  save();
  document.getElementById('main-content').innerHTML = renderPost(p);
}

function updateFileMapping(idx, field, value) {
  const p = getProject(currentProjectId);
  if (!p) return;
  p.stage4_post.fileMapping[idx][field] = value;
  save();
}

function removeFileMapping(idx) {
  const p = getProject(currentProjectId);
  if (!p) return;
  p.stage4_post.fileMapping.splice(idx, 1);
  save();
  document.getElementById('main-content').innerHTML = renderPost(p);
}

function renderPost(p) {
  const s4 = p.stage4_post;
  let html = '';

  // Links
  html += '<div class="card mb-16" style="padding:20px">';
  html += '<div style="font-family:\'DM Mono\',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:12px">External Links</div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
  html += `<div class="form-group"><label class="form-label">Google Drive Link</label><input class="input" value="${esc(s4.driveLink || '')}" onchange="savePostField('driveLink',this.value)" placeholder="Paste Drive folder URL..."></div>`;
  html += `<div class="form-group"><label class="form-label">Frame.io Link</label><input class="input" value="${esc(s4.frameioLink || '')}" onchange="savePostField('frameioLink',this.value)" placeholder="Paste Frame.io project URL..."></div>`;
  html += '</div>';
  if (s4.driveLink || s4.frameioLink) {
    html += '<div style="display:flex;gap:8px;margin-top:8px">';
    if (s4.driveLink) html += `<a href="${esc(s4.driveLink)}" target="_blank" class="btn btn-outline btn-sm">Open Drive &nearr;</a>`;
    if (s4.frameioLink) html += `<a href="${esc(s4.frameioLink)}" target="_blank" class="btn btn-outline btn-sm">Open Frame.io &nearr;</a>`;
    html += '</div>';
  }
  html += '</div>';

  // Editor notes
  html += '<div class="card mb-16" style="padding:20px">';
  html += '<div style="font-family:\'DM Mono\',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:8px">Editor Handoff Notes</div>';
  html += `<textarea class="textarea" rows="3" onchange="savePostField('editorNotes',this.value)" placeholder="General notes for the editor — style, pacing, music direction, brand guidelines...">${esc(s4.editorNotes || '')}</textarea>`;
  html += '</div>';

  // Deliverables
  const DEL_TYPES = ['hero','social-clip','broll-library','highlight','testimonial','other'];
  const DEL_STATUSES = [
    {v:'not-started',l:'Not Started',c:'var(--dim)'},
    {v:'editing',l:'Editing',c:'var(--yellow)'},
    {v:'review',l:'In Review',c:'var(--cyan)'},
    {v:'revision',l:'Revision',c:'var(--orange)'},
    {v:'approved',l:'Approved',c:'var(--green)'},
    {v:'delivered',l:'Delivered',c:'var(--green)'}
  ];
  html += '<div class="card mb-16" style="padding:20px">';
  html += '<div class="flex-between mb-12"><div style="font-family:\'DM Mono\',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)">Deliverables</div>';
  html += '<button class="btn btn-gold btn-sm" onclick="addDeliverable()">+ Add</button></div>';

  if (s4.deliverables.length === 0) {
    html += '<div class="dim text-center" style="padding:20px">No deliverables yet</div>';
  } else {
    s4.deliverables.forEach((d, i) => {
      const st = DEL_STATUSES.find(s => s.v === d.status) || DEL_STATUSES[0];
      html += `<div class="card mb-12" style="padding:14px;border-color:${d.status === 'approved' || d.status === 'delivered' ? 'var(--green-dim)' : 'var(--border)'}">`;
      html += '<div style="display:grid;grid-template-columns:1fr 120px 140px 30px;gap:8px;align-items:center;margin-bottom:8px">';
      html += `<input class="input" value="${esc(d.name || '')}" onchange="updateDeliverable(${i},'name',this.value)" placeholder="Deliverable name..." style="font-weight:600">`;
      html += `<select class="input" onchange="updateDeliverable(${i},'type',this.value)" style="font-size:11px">`;
      DEL_TYPES.forEach(t => html += `<option value="${t}"${d.type === t ? ' selected' : ''}>${t}</option>`);
      html += '</select>';
      html += `<select class="input" onchange="updateDeliverable(${i},'status',this.value);document.getElementById('main-content').innerHTML=renderPost(getProject(currentProjectId))" style="font-size:11px;color:${st.c}">`;
      DEL_STATUSES.forEach(s => html += `<option value="${s.v}"${d.status === s.v ? ' selected' : ''}>${s.l}</option>`);
      html += '</select>';
      html += `<button onclick="removeDeliverable(${i})" style="background:none;border:none;color:var(--red);font-size:14px;cursor:pointer">&times;</button>`;
      html += '</div>';
      html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">`;
      html += `<input class="input" value="${esc(d.editorAssigned || '')}" onchange="updateDeliverable(${i},'editorAssigned',this.value)" placeholder="Editor assigned..." style="font-size:12px">`;
      html += `<textarea class="textarea" rows="1" onchange="updateDeliverable(${i},'notes',this.value)" placeholder="Notes..." style="font-size:12px">${esc(d.notes || '')}</textarea>`;
      html += '</div></div>';
    });
  }
  html += '</div>';

  // File mapping
  html += '<div class="card" style="padding:20px">';
  html += '<div class="flex-between mb-12"><div style="font-family:\'DM Mono\',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)">File Mapping</div>';
  html += '<button class="btn btn-outline btn-sm" onclick="addFileMapping()">+ Add</button></div>';
  html += '<div class="dim mb-12" style="font-size:11px">Map raw files to shots using check-off timestamps from shoot day.</div>';

  if (s4.fileMapping.length === 0) {
    html += '<div class="dim text-center" style="padding:16px">No file mappings yet</div>';
  } else {
    s4.fileMapping.forEach((fm, i) => {
      html += '<div style="display:grid;grid-template-columns:1fr 80px 100px 30px;gap:8px;align-items:center;margin-bottom:8px">';
      html += `<input class="input" value="${esc(fm.fileName || '')}" onchange="updateFileMapping(${i},'fileName',this.value)" placeholder="File name..." style="font-size:12px">`;
      html += `<input class="input" value="${esc(fm.shotId || '')}" onchange="updateFileMapping(${i},'shotId',this.value)" placeholder="Shot ID" style="font-size:12px">`;
      html += `<input class="input" value="${esc(fm.timestamp || '')}" onchange="updateFileMapping(${i},'timestamp',this.value)" placeholder="Timestamp" style="font-size:12px">`;
      html += `<button onclick="removeFileMapping(${i})" style="background:none;border:none;color:var(--red);font-size:14px;cursor:pointer">&times;</button>`;
      html += '</div>';
    });
  }
  html += '</div>';

  return html;
}

function saveDeliveryField(field, value) {
  const p = getProject(currentProjectId);
  if (!p) return;
  p.stage5_delivery[field] = value;
  save();
}

function setDeliverableApproval(delIdx, approved) {
  const p = getProject(currentProjectId);
  if (!p) return;
  const del = p.stage4_post.deliverables[delIdx];
  if (!del) return;
  let appr = p.stage5_delivery.approvals.find(a => a.deliverableId === del.id);
  if (!appr) {
    appr = { deliverableId: del.id, approved: false, feedback: '', approvedAt: null };
    p.stage5_delivery.approvals.push(appr);
  }
  appr.approved = approved;
  appr.approvedAt = approved ? nowISO() : null;
  if (approved) del.status = 'approved';
  save();
  document.getElementById('main-content').innerHTML = renderDelivery(p);
}

function saveDeliverableFeedback(delIdx, feedback) {
  const p = getProject(currentProjectId);
  if (!p) return;
  const del = p.stage4_post.deliverables[delIdx];
  if (!del) return;
  let appr = p.stage5_delivery.approvals.find(a => a.deliverableId === del.id);
  if (!appr) {
    appr = { deliverableId: del.id, approved: false, feedback: '', approvedAt: null };
    p.stage5_delivery.approvals.push(appr);
  }
  appr.feedback = feedback;
  save();
}

function renderDelivery(p) {
  const s5 = p.stage5_delivery;
  const deliverables = p.stage4_post.deliverables || [];
  let html = '';

  // Client review link
  html += '<div class="card mb-16" style="padding:20px">';
  html += '<div style="font-family:\'DM Mono\',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:12px">Client Review</div>';
  html += `<div class="form-group"><label class="form-label">Client Review Link</label><input class="input" value="${esc(s5.clientReviewLink || '')}" onchange="saveDeliveryField('clientReviewLink',this.value)" placeholder="Frame.io review link, Google Drive share link..."></div>`;
  if (s5.clientReviewLink) {
    html += `<a href="${esc(s5.clientReviewLink)}" target="_blank" class="btn btn-outline btn-sm">Open Review Link &nearr;</a>`;
  }
  html += '</div>';

  // Per-deliverable approval
  html += '<div class="card mb-16" style="padding:20px">';
  const approvedCount = deliverables.filter(d => {
    const a = s5.approvals.find(a => a.deliverableId === d.id);
    return a && a.approved;
  }).length;
  html += `<div class="flex-between mb-12"><div style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)">Deliverable Approvals</div>`;
  html += `<span style="font-family:'DM Mono',monospace;font-size:12px;color:${approvedCount === deliverables.length && deliverables.length > 0 ? 'var(--green)' : 'var(--dim)'}">${approvedCount}/${deliverables.length}</span></div>`;

  if (deliverables.length === 0) {
    html += '<div class="dim text-center" style="padding:20px">No deliverables to review — add them in the Post tab first</div>';
  } else {
    deliverables.forEach((d, i) => {
      const appr = s5.approvals.find(a => a.deliverableId === d.id) || { approved: false, feedback: '', approvedAt: null };
      html += `<div class="card mb-12" style="padding:14px;border-color:${appr.approved ? 'var(--green-dim)' : 'var(--border)'}">`;
      html += '<div class="flex-between mb-8">';
      html += `<div><span style="font-weight:600">${esc(d.name || 'Untitled')}</span> <span class="dim" style="font-size:11px">${esc(d.type)}</span></div>`;
      if (appr.approved) {
        html += `<button onclick="setDeliverableApproval(${i},false)" style="background:var(--green-dim);border:1px solid var(--green);color:var(--green);border-radius:6px;padding:4px 12px;font-size:11px;cursor:pointer">Approved ✓</button>`;
      } else {
        html += `<button onclick="setDeliverableApproval(${i},true)" class="btn btn-gold btn-sm">Approve</button>`;
      }
      html += '</div>';
      html += `<textarea class="textarea" rows="2" onchange="saveDeliverableFeedback(${i},this.value)" placeholder="Client feedback / revision notes...">${esc(appr.feedback || '')}</textarea>`;
      if (appr.approvedAt) html += `<div class="dim" style="font-size:10px;margin-top:4px;font-family:'DM Mono',monospace">Approved ${new Date(appr.approvedAt).toLocaleString('en-AU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div>`;
      html += '</div>';
    });
  }
  html += '</div>';

  // Final delivery date
  html += '<div class="card mb-16" style="padding:20px">';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';
  html += `<div class="form-group"><label class="form-label">Final Delivery Date</label><input class="input" type="date" value="${esc(s5.finalDeliveryDate || '')}" onchange="saveDeliveryField('finalDeliveryDate',this.value)"></div>`;
  html += '<div></div>';
  html += '</div>';
  html += '</div>';

  // Wrap notes
  html += '<div class="card" style="padding:20px">';
  html += '<div style="font-family:\'DM Mono\',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:8px">Wrap Notes</div>';
  html += `<textarea class="textarea" rows="4" onchange="saveDeliveryField('wrapNotes',this.value)" placeholder="Final notes, lessons learned, follow-up actions...">${esc(s5.wrapNotes || '')}</textarea>`;
  html += '</div>';

  return html;
}

function saveCommsEntry() {
  const p = getProject(currentProjectId);
  if (!p) return;
  const type = document.getElementById('ce-type').value;
  const date = document.getElementById('ce-date').value;
  const subject = document.getElementById('ce-subject').value.trim();
  const summary = document.getElementById('ce-summary').value.trim();
  const changes = document.getElementById('ce-changes').value.trim();
  if (!summary && !subject) { toast('Add a subject or summary'); return; }
  if (!p.comms) p.comms = [];
  p.comms.push({
    id: uid(), type, date: date || todayStr(), subject, summary, source: 'manual',
    extractedChanges: changes ? changes.split('\n').filter(l => l.trim()) : [],
    createdAt: nowISO()
  });
  p.updatedAt = nowISO();
  save();
  closeModal();
  toast('Communication added');
  document.getElementById('main-content').innerHTML = renderComms(p);
}

function removeCommsEntry(entryId) {
  const p = getProject(currentProjectId);
  if (!p || !p.comms) return;
  p.comms = p.comms.filter(c => c.id !== entryId);
  save();
  document.getElementById('main-content').innerHTML = renderComms(p);
}

function renderComms(p) {
  const comms = (p.comms || []).slice().sort((a, b) => (b.date || '').localeCompare(a.date || '') || (b.createdAt || '').localeCompare(a.createdAt || ''));
  let html = '';

  html += '<div class="flex-between mb-16"><div style="font-family:\'DM Mono\',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)">Communications Log</div>';
  html += '<button class="btn btn-gold btn-sm" onclick="addCommsEntry()">+ Add Entry</button></div>';

  if (comms.length === 0) {
    html += '<div class="card text-center" style="padding:40px"><div style="font-size:28px;margin-bottom:8px">&#128172;</div>';
    html += '<div class="dim mb-8">No communications logged yet</div>';
    html += '<div class="dim" style="font-size:11px">Add email summaries, call notes, Fathom transcripts, or general notes.</div></div>';
    return html;
  }

  const COMM_ICONS = { email: '&#9993;', call: '&#128222;', meeting: '&#128101;', fathom: '&#127908;', note: '&#128221;' };
  const COMM_COLORS = { email: 'var(--cyan)', call: 'var(--green)', meeting: 'var(--purple)', fathom: 'var(--gold)', note: 'var(--dim)' };

  comms.forEach(c => {
    const icon = COMM_ICONS[c.type] || '&#128172;';
    const color = COMM_COLORS[c.type] || 'var(--dim)';
    html += `<div class="card mb-12" style="padding:16px">`;
    html += '<div class="flex-between mb-8">';
    html += `<div style="display:flex;align-items:center;gap:8px">`;
    html += `<span style="font-size:16px">${icon}</span>`;
    html += `<span style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px;background:color-mix(in srgb,${color} 15%,transparent);color:${color}">${esc(c.type)}</span>`;
    if (c.subject) html += `<span style="font-weight:600;font-size:13px">${esc(c.subject)}</span>`;
    html += '</div>';
    html += `<div style="display:flex;align-items:center;gap:8px">`;
    html += `<span class="dim" style="font-size:10px;font-family:'DM Mono',monospace">${c.date ? new Date(c.date + 'T00:00:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' }) : ''}</span>`;
    html += `<button onclick="removeCommsEntry('${c.id}')" style="background:none;border:none;color:var(--dim);font-size:12px;cursor:pointer;opacity:0.5" onmouseover="this.style.color='var(--red)';this.style.opacity=1" onmouseout="this.style.color='var(--dim)';this.style.opacity=0.5">&times;</button>`;
    html += '</div></div>';

    if (c.summary) {
      html += `<div style="font-size:13px;line-height:1.6;white-space:pre-wrap;color:var(--text);opacity:0.9">${esc(c.summary)}</div>`;
    }

    if (c.extractedChanges && c.extractedChanges.length > 0) {
      html += `<div style="margin-top:10px;padding:8px 12px;background:var(--gold-dim);border:1px solid var(--gold-glow);border-radius:6px">`;
      html += `<div style="font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:4px">Changes Noted</div>`;
      c.extractedChanges.forEach(ch => {
        html += `<div style="font-size:12px;color:var(--text);padding-left:8px;border-left:2px solid var(--gold);margin-top:4px">${esc(ch)}</div>`;
      });
      html += '</div>';
    }

    html += '</div>';
  });

  return html;
}

let changesFilter = 'unreviewed'; // 'all', 'unreviewed', 'client'

function renderChanges(p) {
  const all = (p.changelog || []).slice().reverse();
  let filtered;
  switch (changesFilter) {
    case 'unreviewed': filtered = all.filter(c => !c.reviewed); break;
    case 'client': filtered = all.filter(c => c.author === 'client'); break;
    default: filtered = all;
  }

  let html = '';

  // Filter buttons
  const unrevCount = all.filter(c => !c.reviewed).length;
  const clientCount = all.filter(c => c.author === 'client').length;
  html += '<div class="flex-between mb-16"><div class="label" style="margin-bottom:0">Changes</div>';
  if (unrevCount > 0) html += `<button class="btn-sm btn" onclick="markAllReviewed()">Mark all reviewed</button>`;
  html += '</div>';
  html += '<div class="sl-filters mb-16">';
  html += `<div class="sl-fbtn${changesFilter === 'unreviewed' ? ' on' : ''}" onclick="setChangesFilter('unreviewed')">Unreviewed (${unrevCount})</div>`;
  html += `<div class="sl-fbtn${changesFilter === 'client' ? ' on' : ''}" onclick="setChangesFilter('client')">Client only (${clientCount})</div>`;
  html += `<div class="sl-fbtn${changesFilter === 'all' ? ' on' : ''}" onclick="setChangesFilter('all')">All (${all.length})</div>`;
  html += '</div>';

  if (filtered.length === 0) {
    html += '<div class="card text-center" style="padding:40px"><div class="dim">No changes to show</div></div>';
    return html;
  }

  filtered.forEach(c => {
    const reviewed = c.reviewed ? ' reviewed' : '';
    html += `<div class="card change-entry${reviewed}">`;
    html += `<div class="flex-between mb-4"><div class="flex gap-8 flex-center">`;
    if (c.shotId) html += `<span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);font-weight:600">${esc(c.shotId)}</span>`;
    html += `<span class="dim" style="font-size:11px">${esc(c.field === 'text' ? 'Shot description' : c.field === 'note' ? 'Shot notes' : c.field === 'approval' ? 'Approval' : c.field || '')}</span>`;
    html += '</div>';
    html += `<span class="dim" style="font-size:10px;font-family:'DM Mono',monospace">${new Date(c.timestamp).toLocaleString('en-AU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })}</span>`;
    html += '</div>';
    if (c.oldValue) html += `<div class="change-old">${esc(c.oldValue)}</div>`;
    html += `<div class="change-new">${esc(c.newValue || '')}</div>`;
    html += `<div class="flex gap-8 mt-8 flex-center">`;
    const tagColor = c.author === 'client' ? 'background:var(--gold-dim);color:var(--gold)' : 'background:var(--blue-dim);color:var(--blue)';
    html += `<span class="tag" style="${tagColor}">${esc(c.author === 'client' ? 'Client' : 'Sev')}</span>`;
    if (!c.reviewed) html += `<button class="btn-ghost btn-sm" onclick="markChangeReviewed('${c.id}')">Mark Reviewed</button>`;
    else html += `<span class="dim" style="font-size:10px">&#10003; Reviewed</span>`;
    html += '</div></div>';
  });
  return html;
}

function setChangesFilter(f) {
  changesFilter = f;
  renderProjectView();
}

function markAllReviewed() {
  const p = getProject(currentProjectId);
  if (!p) return;
  p.changelog.forEach(c => { c.reviewed = true; });
  p.updatedAt = nowISO();
  save();
  renderProjectView();
  toast('All changes marked reviewed');
}

function markChangeReviewed(changeId) {
  const p = getProject(currentProjectId);
  if (!p) return;
  const c = p.changelog.find(x => x.id === changeId);
  if (c) c.reviewed = true;
  p.updatedAt = nowISO();
  save();
  renderProjectView();
}

function createShareLink() {

async function loadSharedProject(token) {
  // Scan all vault paths in Firebase to find the project with this token
  // Since we don't know the vault hash, we search localStorage first
  // then try Firebase with a known structure
  let found = null;

  // Check localStorage projects
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const localProjects = JSON.parse(s);
      for (const p of localProjects) {
        if (p.meta && p.meta.shareTokens && p.meta.shareTokens[token]) {
          found = p;
          break;
        }
      }
    }
  } catch (e) {}

  // If not found locally, try Firebase with the owner vault path
  if (!found) {
    try {
      const ownerVault = 'pipeline/' + OWNER_HASH;
      const snap = await db.ref(ownerVault + '/_index').once('value');
      const idx = snap.val();
      if (idx) {
        for (const pid of Object.keys(idx)) {
          const pSnap = await db.ref(ownerVault + '/projects/' + pid + '/data').once('value');
          const pData = pSnap.val();
          if (pData && pData.meta && pData.meta.shareTokens && pData.meta.shareTokens[token]) {
            found = pData;
            fixProject(found);
            break;
          }
        }
      }
    } catch (e) { console.warn('Firebase shared load failed:', e); }
  }

  return found;
}

function enterSharedMode(project, token) {
  sharedMode = true;
  sharedToken = token;
  sharedProject = project;
  const tokData = project.meta.shareTokens[token];
  sharedScope = tokData.scope;
  sharedAllowEdit = tokData.allowEdit;

  document.getElementById('lock-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('new-proj-btn').classList.add('hidden');

  document.getElementById('header-title').textContent = project.meta.businessName || project.meta.clientName || 'Project';
  document.getElementById('header-sub').textContent = 'Viewing as: ' + tokData.label;

  // Show only tabs allowed by scope
  const tabBar = document.getElementById('project-tabs');
  tabBar.classList.remove('hidden');
  const scopeTabs = getScopeTabs(sharedScope);
  tabBar.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('hidden', !scopeTabs.includes(t.dataset.tab));
  });

  currentProjectId = project.id;
  currentTab = scopeTabs[0] || 'shotlist';
  tabBar.querySelector('.tab[data-tab="' + currentTab + '"]')?.classList.add('active');

  renderSharedView();
}

function getScopeTabs(scope) {
  switch (scope) {
    case 'full': return ['overview', 'shotlist', 'shoot', 'post', 'delivery', 'comms'];
    case 'shotlist': return ['shotlist'];
    case 'shoot': return ['shoot'];
    case 'post': return ['post'];
    default: return ['shotlist'];
  }
}

function renderSharedView() {
  const p = sharedProject;
  if (!p) return;

  // Activate correct tab
  document.querySelectorAll('#project-tabs .tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === currentTab);
  });

  const content = document.getElementById('main-content');
  let html = '';

  // Shared banner
  html += `<div class="shared-banner"><div><span class="shared-banner-label">Shared View</span><span class="shared-banner-text"> — ${esc(p.meta.shareTokens[sharedToken]?.label || 'Client')}</span></div>`;
  if (sharedAllowEdit) html += '<span class="tag" style="background:var(--green-dim);color:var(--green)">Editing enabled</span>';
  else html += '<span class="tag" style="background:rgba(125,133,144,0.15);color:var(--dim)">Read-only</span>';
  html += '</div>';

  switch (currentTab) {
    case 'overview': html += renderOverview(p); break;
    case 'shotlist': html += renderSharedShotList(p); break;
    case 'shoot': html += renderShootDay(p); break;
    case 'post': html += renderPost(p); break;
    case 'delivery': html += renderDelivery(p); break;
    case 'comms': html += renderComms(p); break;
    default: html += renderSharedShotList(p);
  }
  content.innerHTML = html;
}

function renderSharedShotList(p) {
  const pre = p.stage2_preproduction;
  const h = pre.header;
  const aTotal = countAShots(p);
  const bTotal = countBShots(p);
  const aDone = countADone(p);
  const bDone = countBDone(p);

  let html = '';

  // Header
  html += '<div class="sl-header"><div class="flex-between flex-wrap gap-12">';
  html += '<div>';
  html += '<div class="sl-eyebrow">Bright Tsar Studios — Shoot Shotlist</div>';
  html += `<div class="sl-title">${esc(h.clientName || p.meta.clientName || 'Untitled')}${h.date ? ' &middot; ' + fmtDate(h.date) : ''}</div>`;
  html += `<div class="sl-meta">${esc(h.crew.lead || 'Sev')} (A-Roll lead)${h.crew.second ? ' + ' + esc(h.crew.second) + ' (B-Roll)' : ''}`;
  if (h.timeRange.start) html += ` &middot; ${fmtTime(h.timeRange.start)} to ${fmtTime(h.timeRange.end)}${h.hardStop ? ' hard stop' : ''}`;
  if (h.shootType) html += ` &middot; ${esc(h.shootType)}`;
  html += '</div></div>';
  html += '<div class="sl-stats">';
  html += `<div class="sl-stat"><div class="sl-stat-num">${aTotal}</div><div class="sl-stat-label">A-Roll</div></div>`;
  html += `<div class="sl-stat"><div class="sl-stat-num">${bTotal}</div><div class="sl-stat-label">B-Roll</div></div>`;
  html += '</div></div></div>';

  // Sub-tabs
  html += '<div class="sl-tabs">';
  html += `<button class="sl-tab${slActivePanel === 'aroll' ? ' active' : ''}" onclick="switchSharedPanel('aroll')">A-Roll</button>`;
  html += `<button class="sl-tab${slActivePanel === 'broll' ? ' active' : ''}" onclick="switchSharedPanel('broll')">B-Roll</button>`;
  html += '</div>';

  // A-Roll Panel
  html += `<div class="sl-panel${slActivePanel === 'aroll' ? ' active' : ''}">`;
  const aPct = aTotal > 0 ? Math.round(aDone / aTotal * 100) : 0;
  html += `<div class="sl-progress-wrap"><div class="sl-progress-bar" style="width:${aPct}%"></div></div>`;
  html += `<div class="sl-progress-label">${aDone} / ${aTotal} shots</div>`;

  pre.aroll.blocks.forEach((block, bi) => {
    html += '<div class="sl-block">';
    html += '<div class="sl-block-head">';
    if (block.time) html += `<span class="sl-block-time">${esc(fmtTime(block.time) || block.time)}</span>`;
    html += `<span class="sl-block-tag bt-${block.type}">${BLOCK_TYPE_LABELS[block.type] || block.type}</span>`;
    html += `<span class="sl-block-title">${esc(block.title)}</span>`;
    if (block.desc) html += `<span class="sl-block-desc">${esc(block.desc)}</span>`;
    html += '</div><div class="sl-shots">';
    (block.shots || []).forEach((shot, si) => {
      html += renderSharedShot(shot, 'a', bi, si);
    });
    html += '</div></div>';
  });
  html += '</div>';

  // B-Roll Panel
  html += `<div class="sl-panel${slActivePanel === 'broll' ? ' active' : ''}">`;
  const bPct = bTotal > 0 ? Math.round(bDone / bTotal * 100) : 0;
  html += `<div class="sl-progress-wrap"><div class="sl-progress-bar" style="width:${bPct}%"></div></div>`;
  html += `<div class="sl-progress-label">${bDone} / ${bTotal} shots</div>`;

  html += '<div class="sl-filters">';
  html += `<div class="sl-fbtn${brollFilter === 'all' ? ' on' : ''}" onclick="filterBrollShared('all')">All</div>`;
  BROLL_CATS.forEach(cat => {
    html += `<div class="sl-fbtn${brollFilter === cat.key ? ' on' : ''}" onclick="filterBrollShared('${cat.key}')">${cat.title}</div>`;
  });
  html += '</div>';

  pre.broll.categories.forEach((cat, ci) => {
    if (brollFilter !== 'all' && cat.key !== brollFilter) return;
    html += '<div class="sl-bcat">';
    html += '<div class="sl-bcat-head">';
    html += `<span class="sl-bcat-icon">${cat.icon}</span>`;
    html += `<div><div class="sl-bcat-title">${esc(cat.title)}</div></div>`;
    html += `<span class="sl-bcat-count">${(cat.shots || []).length} shots</span>`;
    html += '</div><div class="sl-shots">';
    (cat.shots || []).forEach((shot, si) => {
      html += renderSharedShot(shot, 'b', ci, si);
    });
    html += '</div></div>';
  });
  html += '</div>';

  // Client approval section
  const approval = pre.clientApproval;
  if (sharedAllowEdit) {
    html += '<div class="approval-bar' + (approval.approved ? ' approved' : '') + '">';
    if (approval.approved) {
      html += `<div style="color:var(--green);font-weight:600;font-size:15px;margin-bottom:4px">&#10003; Approved</div>`;
      html += `<div class="dim" style="font-size:12px">Approved on ${fmtDate(approval.approvedAt)}</div>`;
      html += `<button class="btn-ghost btn-sm mt-8" onclick="clientUnapprove()">Revoke Approval</button>`;
    } else {
      html += `<div style="font-weight:500;margin-bottom:8px">Happy with the shot list?</div>`;
      html += `<button class="btn" onclick="clientApprove()">Save &amp; Approve</button>`;
    }
    html += '</div>';
  }

  return html;
}

function renderSharedShot(shot, type, parentIdx, shotIdx) {
  const isEditing = editingShot && editingShot.type === type && editingShot.parentIdx === parentIdx && editingShot.shotIdx === shotIdx;
  const done = shot.done ? ' done' : '';
  const editable = sharedAllowEdit ? ' sl-shot-editable' : '';
  const editing = isEditing ? ' sl-shot-editing' : '';

  let html = `<div class="sl-shot${done}${editable}${editing}">`;
  html += `<div class="sl-shot-check"><input type="checkbox" ${shot.done ? 'checked' : ''} disabled></div>`;
  html += `<div class="sl-shot-num">${esc(shot.id)}</div>`;
  html += '<div class="sl-shot-body">';

  if (isEditing) {
    html += `<textarea class="edit-field" id="shared-edit-text" rows="2">${esc(shot.text)}</textarea>`;
    html += `<textarea class="edit-field" id="shared-edit-note" rows="1" placeholder="Notes (optional)">${esc(shot.note || '')}</textarea>`;
    html += '<div class="edit-actions">';
    html += `<button class="btn btn-sm" onclick="saveSharedEdit('${type}',${parentIdx},${shotIdx})">Save</button>`;
    html += `<button class="btn-ghost btn-sm" onclick="cancelSharedEdit()">Cancel</button>`;
    html += '</div>';
  } else {
    html += `<div class="sl-shot-text">${esc(shot.text)}</div>`;
    if (shot.note) html += `<div class="sl-shot-note">${esc(shot.note)}</div>`;
    if (shot.tags && shot.tags.length) {
      html += '<div class="sl-shot-tags">';
      shot.tags.forEach(t => { html += `<span class="stag stag-${t}">${TAG_LABELS[t] || t}</span>`; });
      html += '</div>';
    }
    if (sharedAllowEdit) {
      html += `<div class="mt-8"><button class="btn-ghost btn-sm" onclick="startSharedEdit('${type}',${parentIdx},${shotIdx})">Edit</button></div>`;
    }
  }

  html += '</div></div>';
  return html;
}

function switchSharedPanel(panel) {
  slActivePanel = panel;
  renderSharedView();
}

function filterBrollShared(key) {
  brollFilter = key;
  renderSharedView();
}

function startSharedEdit(type, parentIdx, shotIdx) {
  editingShot = { type, parentIdx, shotIdx };
  renderSharedView();
  setTimeout(() => { const el = document.getElementById('shared-edit-text'); if (el) el.focus(); }, 50);
}

function cancelSharedEdit() {
  editingShot = null;
  renderSharedView();
}

function saveSharedEdit(type, parentIdx, shotIdx) {
  const p = sharedProject;
  if (!p) return;
  let shot;
  if (type === 'a') shot = p.stage2_preproduction.aroll.blocks[parentIdx].shots[shotIdx];
  else shot = p.stage2_preproduction.broll.categories[parentIdx].shots[shotIdx];

  const newText = document.getElementById('shared-edit-text').value.trim();
  const newNote = document.getElementById('shared-edit-note').value.trim();

  // Log changes
  if (newText !== shot.text) {
    p.changelog.push({
      id: uid(), timestamp: nowISO(), author: 'client',
      authorLabel: 'Client (via ' + (p.meta.shareTokens[sharedToken]?.label || 'shared link') + ')',
      field: 'text', shotId: shot.id,
      oldValue: shot.text, newValue: newText, reviewed: false
    });
    shot.text = newText;
  }
  if (newNote !== (shot.note || '')) {
    p.changelog.push({
      id: uid(), timestamp: nowISO(), author: 'client',
      authorLabel: 'Client (via ' + (p.meta.shareTokens[sharedToken]?.label || 'shared link') + ')',
      field: 'note', shotId: shot.id,
      oldValue: shot.note || '', newValue: newNote, reviewed: false
    });
    shot.note = newNote;
  }

  p.updatedAt = nowISO();
  editingShot = null;

  // Save to Firebase
  if (vaultPath) {
    db.ref(vaultPath + '/projects/' + p.id + '/data').set(p).catch(e => console.warn('Firebase shared save failed:', e));
  } else {
    // Try owner vault path
    db.ref('pipeline/' + OWNER_HASH + '/projects/' + p.id + '/data').set(p).catch(e => console.warn('Firebase shared save failed:', e));
  }
  // Also update localStorage if available
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) {
      const arr = JSON.parse(s);
      const idx = arr.findIndex(x => x.id === p.id);
      if (idx >= 0) { arr[idx] = p; localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }
    }
  } catch (e) {}

  renderSharedView();
  toast('Changes saved');
}

function clientApprove() {
  const p = sharedProject;
  if (!p) return;
  p.stage2_preproduction.clientApproval.approved = true;
  p.stage2_preproduction.clientApproval.approvedAt = nowISO();
  p.stage2_preproduction.clientApproval.savedSnapshots.push({
    timestamp: nowISO(),
    aroll: JSON.parse(JSON.stringify(p.stage2_preproduction.aroll)),
    broll: JSON.parse(JSON.stringify(p.stage2_preproduction.broll))
  });
  p.changelog.push({
    id: uid(), timestamp: nowISO(), author: 'client',
    authorLabel: 'Client', field: 'approval', shotId: '',
    oldValue: 'Not approved', newValue: 'Approved', reviewed: false
  });
  p.updatedAt = nowISO();
  db.ref('pipeline/' + OWNER_HASH + '/projects/' + p.id + '/data').set(p).catch(e => {});
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) { const arr = JSON.parse(s); const idx = arr.findIndex(x => x.id === p.id); if (idx >= 0) { arr[idx] = p; localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); } }
  } catch (e) {}
  renderSharedView();
  toast('Shot list approved!');
}

function clientUnapprove() {
  const p = sharedProject;
  if (!p) return;
  p.stage2_preproduction.clientApproval.approved = false;
  p.stage2_preproduction.clientApproval.approvedAt = null;
  p.changelog.push({
    id: uid(), timestamp: nowISO(), author: 'client',
    authorLabel: 'Client', field: 'approval', shotId: '',
    oldValue: 'Approved', newValue: 'Revoked approval', reviewed: false
  });
  p.updatedAt = nowISO();
  db.ref('pipeline/' + OWNER_HASH + '/projects/' + p.id + '/data').set(p).catch(e => {});
  renderSharedView();
  toast('Approval revoked');
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════

(async function init() {
  // Check for shared token in URL
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');

  if (token) {
    const project = await loadSharedProject(token);
    if (project && project.meta.shareTokens[token]) {
      enterSharedMode(project, token);
    } else {
      document.getElementById('lock-screen').querySelector('.lock-box').innerHTML =
        '<div style="color:var(--red);font-size:16px;font-weight:600;margin-bottom:8px">Invalid or expired link</div>' +
        '<div class="dim">This share link is no longer valid. Please request a new one.</div>';
    }
    return;
  }

  if (checkSession()) {
    await loadData();
    route();
  }
})();

</script>
</body>
</html>
