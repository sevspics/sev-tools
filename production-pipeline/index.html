<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Production Pipeline | Bright Tsar Studios</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BTS Pipeline">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1f3ac;</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #1a1f29; --border: #21262d;
  --gold: #c9a227; --gold-dim: rgba(201,162,39,0.2); --gold-glow: rgba(201,162,39,0.4);
  --text: #e6edf3; --dim: #7d8590; --white: #fff;
  --green: #22c55e; --green-dim: rgba(34,197,94,0.15);
  --red: #ef4444; --red-dim: rgba(239,68,68,0.15);
  --yellow: #f59e0b; --yellow-dim: rgba(245,158,11,0.15);
  --orange: #f97316; --purple: #8b5cf6; --purple-dim: rgba(139,92,246,0.15);
  --cyan: #06b6d4; --cyan-dim: rgba(6,182,212,0.15);
  --blue: #3b82f6; --blue-dim: rgba(59,130,246,0.15);
  --amber: #d97706; --amber-dim: rgba(217,119,6,0.15);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; overscroll-behavior-y: contain; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
input, textarea, select { font-family: inherit; }
input:focus, textarea:focus, select:focus { border-color: var(--gold) !important; outline: none; }
button { font-family: inherit; cursor: pointer; }
button:hover { opacity: 0.85; }
a { color: var(--gold); text-decoration: none; }

.lock-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
.lock-box { text-align: center; width: 300px; }

.header { background: linear-gradient(135deg, var(--bg2) 0%, var(--bg) 100%); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.header-left { display: flex; align-items: center; gap: 12px; }
.header-back { background: none; border: 1px solid var(--border); color: var(--dim); border-radius: 6px; padding: 4px 10px; font-size: 12px; display: none; }
.header-back:hover { border-color: var(--gold-dim); color: var(--gold); }
.header-title { font-weight: 800; font-size: 18px; color: var(--gold); }
.header-sub { color: var(--dim); font-size: 11px; font-family: 'DM Mono', monospace; }
.header-right { display: flex; gap: 8px; align-items: center; }

.tabs { display: flex; overflow-x: auto; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 10; }
.tab { flex: 0 0 auto; padding: 10px 14px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--dim); font-weight: 400; cursor: pointer; font-size: 12px; white-space: nowrap; transition: all 0.2s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--gold); font-weight: 700; border-bottom-color: var(--gold); }
.tab .badge { background: var(--gold); color: var(--bg); border-radius: 10px; padding: 1px 6px; font-size: 10px; margin-left: 4px; font-weight: 600; }
.tab .badge-red { background: var(--red); color: var(--white); }

.content { padding: 16px; max-width: 900px; margin: 0 auto; }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 12px; }
.card-accent { border-color: var(--gold-dim); }
.label { color: var(--dim); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-family: 'DM Mono', monospace; }
.dim { color: var(--dim); }
.gold { color: var(--gold); }

.btn { background: var(--gold); color: var(--bg); border: none; border-radius: 6px; padding: 8px 16px; font-weight: 600; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
.btn-ghost { background: transparent; color: var(--gold); border: 1px solid var(--border); border-radius: 6px; padding: 8px 16px; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; }
.btn-ghost:hover { border-color: var(--gold-dim); }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-danger { color: var(--red); border-color: rgba(239,68,68,0.3); }
.btn-danger:hover { border-color: var(--red); }
.btn-icon { background: none; border: none; color: var(--dim); padding: 4px; display: inline-flex; }
.btn-icon:hover { color: var(--gold); }

.input { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; width: 100%; font-size: 14px; }
.select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 14px; }
.textarea { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; width: 100%; font-size: 14px; min-height: 60px; resize: vertical; line-height: 1.6; }

.flex { display: flex; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.flex-center { display: flex; align-items: center; }
.gap-4 { gap: 4px; } .gap-6 { gap: 6px; } .gap-8 { gap: 8px; } .gap-10 { gap: 10px; } .gap-12 { gap: 12px; }
.flex-1 { flex: 1; } .flex-wrap { flex-wrap: wrap; }
.mb-4 { margin-bottom: 4px; } .mb-8 { margin-bottom: 8px; } .mb-12 { margin-bottom: 12px; } .mb-16 { margin-bottom: 16px; } .mb-24 { margin-bottom: 24px; }
.mt-8 { margin-top: 8px; } .mt-12 { margin-top: 12px; } .mt-16 { margin-top: 16px; }
.text-center { text-align: center; }
.hidden { display: none !important; }

.progress { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
.progress-bar { height: 100%; border-radius: 3px; transition: width 0.5s ease; background: var(--gold); }

.tag { display: inline-block; border-radius: 4px; padding: 2px 8px; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

.grid-projects { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }

/* Stage stepper */
.stepper { display: flex; align-items: center; gap: 0; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; }
.step { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 500; color: var(--dim); cursor: pointer; white-space: nowrap; transition: all 0.2s; border: 1px solid transparent; }
.step:hover { color: var(--text); }
.step.current { color: var(--gold); border-color: var(--gold-dim); background: var(--gold-dim); }
.step.done { color: var(--green); }
.step-arrow { color: var(--border); font-size: 14px; margin: 0 2px; }

/* Project card on dashboard */
.proj-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; cursor: pointer; transition: border-color 0.2s, transform 0.15s; position: relative; }
.proj-card:hover { border-color: var(--gold-dim); transform: translateY(-2px); }
.proj-card-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
.proj-card-client { font-size: 12px; color: var(--dim); margin-bottom: 8px; }
.proj-card-stage { display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; padding: 2px 8px; border-radius: 4px; }

/* Shot list styles (adapted from Nobel) */
.sl-header { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
.sl-eyebrow { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; font-family: 'DM Mono', monospace; }
.sl-title { font-size: 18px; font-weight: 600; color: var(--white); margin-bottom: 3px; }
.sl-meta { font-size: 11px; color: var(--dim); }
.sl-stats { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 12px; }
.sl-stat { text-align: center; }
.sl-stat-num { font-size: 20px; font-weight: 600; color: var(--gold); font-family: 'DM Mono', monospace; line-height: 1; }
.sl-stat-label { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--dim); margin-top: 2px; }

.sl-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
.sl-tab { padding: 10px 18px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--dim); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.sl-tab:hover { color: var(--text); }
.sl-tab.active { color: var(--white); border-bottom-color: var(--gold); }

.sl-panel { display: none; }
.sl-panel.active { display: block; }

.sl-progress-wrap { background: var(--border); border-radius: 4px; height: 4px; margin-bottom: 8px; overflow: hidden; }
.sl-progress-bar { background: var(--gold); height: 100%; border-radius: 4px; transition: width 0.3s; }
.sl-progress-label { font-size: 11px; color: var(--dim); text-align: right; margin-bottom: 16px; font-family: 'DM Mono', monospace; }

/* Blocks (time-based sections for A-Roll) */
.sl-block { margin-bottom: 28px; }
.sl-block-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.sl-block-time { font-size: 11px; font-weight: 500; color: var(--dim); font-family: 'DM Mono', monospace; background: var(--bg); border: 1px solid var(--border); padding: 3px 9px; border-radius: 4px; white-space: nowrap; }
.sl-block-title { font-size: 14px; font-weight: 500; color: var(--text); }
.sl-block-desc { font-size: 12px; color: var(--dim); margin-left: auto; }
.sl-block-tag { font-size: 9px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 3px 9px; border-radius: 4px; }
.bt-setup { background: var(--bg); color: var(--dim); border: 1px solid var(--border); }
.bt-interview { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
.bt-hero { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(201,162,39,0.3); }
.bt-broll { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }
.bt-warn { background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
.bt-reveal { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(139,92,246,0.3); }

/* Shot rows */
.sl-shots { display: flex; flex-direction: column; gap: 6px; }
.sl-shot { display: grid; grid-template-columns: 28px 48px 1fr; gap: 0 10px; align-items: start; background: var(--bg2); border: 1px solid var(--border); border-radius: 7px; padding: 10px 12px; transition: all 0.15s; cursor: pointer; }
.sl-shot:hover { border-color: var(--gold-dim); }
.sl-shot.done { background: var(--green-dim); border-color: rgba(34,197,94,0.25); }
.sl-shot.done .sl-shot-text { text-decoration: line-through; color: var(--dim); }
.sl-shot-check input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--green); cursor: pointer; margin-top: 2px; }
.sl-shot-num { font-size: 10px; font-weight: 500; color: var(--dim); font-family: 'DM Mono', monospace; padding-top: 2px; }
.sl-shot-body { min-width: 0; }
.sl-shot-text { font-size: 13px; color: var(--text); line-height: 1.5; margin-bottom: 4px; }
.sl-shot-note { font-size: 11.5px; color: var(--dim); line-height: 1.5; }
.sl-shot-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
.sl-shot-ts { font-size: 9px; color: var(--dim); font-family: 'DM Mono', monospace; margin-top: 4px; }

/* Shot tags */
.stag { font-size: 9px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; padding: 2px 7px; border-radius: 3px; border: 1px solid; }
.stag-q { background: var(--amber-dim); color: var(--amber); border-color: rgba(217,119,6,0.3); }
.stag-dir { background: var(--purple-dim); color: var(--purple); border-color: rgba(139,92,246,0.3); }
.stag-ahpra { background: var(--red-dim); color: var(--red); border-color: rgba(239,68,68,0.3); }
.stag-wide { background: var(--blue-dim); color: var(--blue); border-color: rgba(59,130,246,0.3); }
.stag-close { background: var(--green-dim); color: var(--green); border-color: rgba(34,197,94,0.3); }
.stag-medium { background: rgba(125,133,144,0.15); color: var(--dim); border-color: rgba(125,133,144,0.3); }
.stag-macro { background: var(--purple-dim); color: var(--purple); border-color: rgba(139,92,246,0.3); }
.stag-gimbal { background: var(--gold-dim); color: var(--gold); border-color: rgba(201,162,39,0.3); }
.stag-static { background: rgba(125,133,144,0.15); color: var(--dim); border-color: rgba(125,133,144,0.3); }
.stag-rack { background: var(--amber-dim); color: var(--amber); border-color: rgba(217,119,6,0.3); }

/* B-Roll categories */
.sl-bcat { margin-bottom: 28px; }
.sl-bcat-head { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; margin-bottom: 10px; }
.sl-bcat-icon { font-size: 16px; }
.sl-bcat-title { font-size: 13px; font-weight: 500; color: var(--white); }
.sl-bcat-note { font-size: 11px; color: var(--dim); margin-top: 1px; }
.sl-bcat-count { font-size: 10px; color: var(--dim); margin-left: auto; font-family: 'DM Mono', monospace; }

/* B-Roll filter row */
.sl-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.sl-fbtn { font-size: 11px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg2); color: var(--dim); cursor: pointer; transition: all 0.12s; }
.sl-fbtn:hover { border-color: var(--dim); color: var(--text); }
.sl-fbtn.on { background: var(--gold-dim); color: var(--gold); border-color: rgba(201,162,39,0.3); }

/* Add buttons for builder */
.add-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border: 1px dashed var(--border); border-radius: 7px; color: var(--dim); font-size: 12px; cursor: pointer; transition: all 0.15s; margin-top: 8px; }
.add-row:hover { border-color: var(--gold-dim); color: var(--gold); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: none; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.show { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 520px; max-height: 85vh; overflow-y: auto; }
.modal-head { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-head h3 { font-size: 16px; font-weight: 600; }
.modal-body { padding: 16px; }
.modal-foot { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 500; color: var(--dim); margin-bottom: 4px; display: block; }

/* Toast */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--gold); color: var(--bg); padding: 8px 20px; border-radius: 8px; font-weight: 600; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* Tag selector */
.tag-selector { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-opt { padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border); font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; opacity: 0.5; }
.tag-opt.selected { opacity: 1; border-width: 2px; }
.tag-opt[data-tag="q"] { color: var(--amber); border-color: rgba(217,119,6,0.3); }
.tag-opt[data-tag="q"].selected { background: var(--amber-dim); }
.tag-opt[data-tag="dir"] { color: var(--purple); border-color: rgba(139,92,246,0.3); }
.tag-opt[data-tag="dir"].selected { background: var(--purple-dim); }
.tag-opt[data-tag="ahpra"] { color: var(--red); border-color: rgba(239,68,68,0.3); }
.tag-opt[data-tag="ahpra"].selected { background: var(--red-dim); }
.tag-opt[data-tag="wide"] { color: var(--blue); border-color: rgba(59,130,246,0.3); }
.tag-opt[data-tag="wide"].selected { background: var(--blue-dim); }
.tag-opt[data-tag="close"] { color: var(--green); border-color: rgba(34,197,94,0.3); }
.tag-opt[data-tag="close"].selected { background: var(--green-dim); }
.tag-opt[data-tag="medium"] { color: var(--dim); border-color: rgba(125,133,144,0.3); }
.tag-opt[data-tag="medium"].selected { background: rgba(125,133,144,0.15); }
.tag-opt[data-tag="macro"] { color: var(--purple); border-color: rgba(139,92,246,0.3); }
.tag-opt[data-tag="macro"].selected { background: var(--purple-dim); }
.tag-opt[data-tag="gimbal"] { color: var(--gold); border-color: rgba(201,162,39,0.3); }
.tag-opt[data-tag="gimbal"].selected { background: var(--gold-dim); }
.tag-opt[data-tag="static"] { color: var(--dim); border-color: rgba(125,133,144,0.3); }
.tag-opt[data-tag="static"].selected { background: rgba(125,133,144,0.15); }
.tag-opt[data-tag="rack"] { color: var(--amber); border-color: rgba(217,119,6,0.3); }
.tag-opt[data-tag="rack"].selected { background: var(--amber-dim); }

/* Shared/client view */
.shared-banner { background: var(--gold-dim); border: 1px solid rgba(201,162,39,0.3); border-radius: 8px; padding: 10px 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.shared-banner-text { font-size: 12px; color: var(--gold); }
.shared-banner-label { font-weight: 600; }

.sl-shot-editable { cursor: text; }
.sl-shot-editable:hover { border-color: var(--gold); }
.sl-shot-editable .sl-shot-text { cursor: text; }
.sl-shot-editing { border-color: var(--gold) !important; background: var(--bg3) !important; }
.sl-shot-editing .edit-field { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 5px; padding: 6px 10px; width: 100%; font-size: 13px; font-family: inherit; line-height: 1.5; resize: vertical; margin-bottom: 4px; }
.sl-shot-editing .edit-field:focus { border-color: var(--gold); outline: none; }
.sl-shot-editing .edit-actions { display: flex; gap: 6px; margin-top: 6px; }

.change-entry { border-left: 3px solid var(--gold); margin-bottom: 10px; }
.change-entry.reviewed { border-left-color: var(--border); opacity: 0.6; }
.change-old { font-size: 11px; color: var(--dim); text-decoration: line-through; line-height: 1.5; }
.change-new { font-size: 13px; color: var(--text); margin-top: 4px; padding-left: 8px; border-left: 2px solid var(--gold); line-height: 1.5; }
.change-entry.reviewed .change-new { border-left-color: var(--border); }

.approval-bar { background: var(--green-dim); border: 1px solid rgba(34,197,94,0.3); border-radius: 8px; padding: 16px; margin-top: 20px; text-align: center; }
.approval-bar.approved { background: rgba(34,197,94,0.08); }
.approval-bar .btn { background: var(--green); font-size: 15px; padding: 10px 28px; }

@media(max-width:640px) {
  .header { padding: 12px 14px; }
  .content { padding: 12px; }
  .sl-shot { grid-template-columns: 24px 40px 1fr; }
  .sl-block-head { gap: 6px; }
  .sl-block-desc { display: none; }
  .grid-projects { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Lock Screen -->
<div class="lock-screen" id="lock-screen">
  <div class="lock-box">
    <div style="color:var(--gold);font-weight:800;font-size:20px;margin-bottom:4px">PRODUCTION PIPELINE</div>
    <div class="dim" style="font-size:12px;margin-bottom:24px">Bright Tsar Studios</div>
    <input class="input" id="pin-input" type="password" placeholder="Enter PIN" autocomplete="off" style="text-align:center;font-size:20px;letter-spacing:6px;padding:14px">
    <div id="pin-error" style="color:var(--red);font-size:13px;min-height:24px;margin:8px 0"></div>
    <button class="btn" id="pin-btn" style="width:100%;padding:12px;font-size:15px" onclick="unlockApp()">Unlock</button>
  </div>
</div>

<!-- Main App (hidden until auth) -->
<div id="app" class="hidden">
  <div class="header">
    <div class="header-left">
      <button class="header-back" id="back-btn" onclick="goBack()">&#8592; Projects</button>
      <div>
        <div class="header-title" id="header-title">Production Pipeline</div>
        <div class="header-sub" id="header-sub">All projects</div>
      </div>
    </div>
    <div class="header-right">
      <button class="btn-ghost btn-sm" id="new-proj-btn" onclick="openNewProjectModal()">+ New Project</button>
      <button class="btn-icon" onclick="downloadBackup()" title="Download backup">&#128190;</button>
    </div>
  </div>

  <div class="tabs hidden" id="project-tabs">
    <button class="tab active" data-tab="overview" onclick="switchProjectTab('overview',this)">Overview</button>
    <button class="tab" data-tab="sales" onclick="switchProjectTab('sales',this)">Sales</button>
    <button class="tab" data-tab="discovery" onclick="switchProjectTab('discovery',this)">Discovery</button>
    <button class="tab" data-tab="shotlist" onclick="switchProjectTab('shotlist',this)">Shot List</button>
    <button class="tab" data-tab="shoot" onclick="switchProjectTab('shoot',this)">Shoot Day</button>

async function hashPIN(pin) {
  const data = new TextEncoder().encode(pin);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function unlockApp() {
  const pin = document.getElementById('pin-input').value;
  if (!pin) return;
  const hash = await hashPIN(pin);
  if (hash !== OWNER_HASH) {
    document.getElementById('pin-error').textContent = 'Wrong PIN.';
    return;
  }
  vaultPath = 'pipeline/' + hash;
  sessionStorage.setItem('bts-pipeline-vault', vaultPath);
  document.getElementById('lock-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  await loadData();
  route();
}

function checkSession() {
  const saved = sessionStorage.getItem('bts-pipeline-vault');
  if (saved) {
    vaultPath = saved;
    document.getElementById('lock-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    return true;
  }
  return false;
}

document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') unlockApp(); });

// DATA PERSISTENCE

let saveTimer;

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(projects)); } catch (e) {}
  if (!vaultPath) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    const index = {};
    projects.forEach(p => {
      index[p.id] = { clientName: p.meta.clientName, businessName: p.meta.businessName, currentStage: p.meta.currentStage, status: p.meta.status, updatedAt: p.updatedAt };
    });
    db.ref(vaultPath + '/_index').set(index).catch(e => console.warn('Firebase index save failed:', e));
    projects.forEach(p => {
      db.ref(vaultPath + '/projects/' + p.id + '/data').set(p).catch(e => console.warn('Firebase project save failed:', e));
    });
  }, 500);
}

async function loadData() {
  // Try Firebase first
  if (vaultPath) {
    try {
      const snap = await db.ref(vaultPath + '/_index').once('value');
      const idx = snap.val();
      if (idx) {
        const ids = Object.keys(idx);
        const snaps = await Promise.all(ids.map(id => db.ref(vaultPath + '/projects/' + id + '/data').once('value')));
        projects = snaps.map(s => s.val()).filter(Boolean);
        projects.forEach(fixProject);
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(projects)); } catch (e) {}
        return;
      }
    } catch (e) { console.warn('Firebase load failed:', e); }
  }
  // Fallback to localStorage
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) { projects = JSON.parse(s); projects.forEach(fixProject); }
  } catch (e) { projects = []; }
}

function fixProject(p) {
  if (!p.meta) p.meta = defaultProject().meta;
  if (!p.stage0_sales) p.stage0_sales = defaultProject().stage0_sales;
  if (!p.stage1_discovery) p.stage1_discovery = defaultProject().stage1_discovery;
  if (!p.stage2_preproduction) p.stage2_preproduction = defaultProject().stage2_preproduction;
  if (!p.stage2_preproduction.aroll) p.stage2_preproduction.aroll = { blocks: [] };
  if (!p.stage2_preproduction.broll) p.stage2_preproduction.broll = { categories: [] };
  if (!Array.isArray(p.stage2_preproduction.aroll.blocks)) p.stage2_preproduction.aroll.blocks = [];
  if (!Array.isArray(p.stage2_preproduction.broll.categories)) p.stage2_preproduction.broll.categories = [];
  if (!p.stage3_shoot) p.stage3_shoot = defaultProject().stage3_shoot;
  if (!p.stage4_post) p.stage4_post = defaultProject().stage4_post;
  if (!p.stage5_delivery) p.stage5_delivery = defaultProject().stage5_delivery;
  if (!Array.isArray(p.comms)) p.comms = [];
  if (!Array.isArray(p.changelog)) p.changelog = [];
  if (!p.meta.shareTokens) p.meta.shareTokens = {};
}

function getProject(id) { return projects.find(p => p.id === id); }

function projectCardHTML(p) {
  const stage = p.meta.currentStage || 0;
  const stageLabel = STAGE_NAMES[stage] || 'Sales';
  const stageColor = STAGE_COLORS[stage];
  const shotCount = countAllShots(p);
  const date = p.stage2_preproduction.header.date;
  return `<div class="proj-card" onclick="openProject('${p.id}')">
    <div class="proj-card-name">${esc(p.meta.businessName || p.meta.clientName || 'Untitled')}</div>

    </div>
    ${p.meta.shootType ? '<div class="dim" style="font-size:11px;margin-top:6px">' + esc(p.meta.shootType) + '</div>' : ''}

  </div>`;
}

function countAllShots(p) {
  let c = 0;
  if (p.stage2_preproduction && p.stage2_preproduction.aroll) {
    p.stage2_preproduction.aroll.blocks.forEach(b => { c += (b.shots || []).length; });
  }
  if (p.stage2_preproduction && p.stage2_preproduction.broll) {
    p.stage2_preproduction.broll.categories.forEach(cat => { c += (cat.shots || []).length; });
  }
  return c;
}

function renderProjectView() {
  const p = getProject(currentProjectId);
  if (!p) { location.hash = '#dashboard'; return; }

  document.getElementById('header-title').textContent = p.meta.businessName || p.meta.clientName || 'Untitled';
  document.getElementById('header-sub').textContent = STAGE_NAMES[p.meta.currentStage || 0] + (p.stage2_preproduction.header.date ? ' — ' + fmtDate(p.stage2_preproduction.header.date) : '');
  document.getElementById('back-btn').style.display = 'inline-flex';
  document.getElementById('new-proj-btn').classList.add('hidden');
  document.getElementById('project-tabs').classList.remove('hidden');

  // Activate correct tab
  document.querySelectorAll('#project-tabs .tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === currentTab);
  });

  // Update changes badge
  const unreviewed = p.changelog.filter(c => !c.reviewed).length;
  const changesTab = document.querySelector('#project-tabs .tab[data-tab="changes"]');
  if (changesTab) {
    changesTab.innerHTML = 'Changes' + (unreviewed > 0 ? ' <span class="badge badge-red">' + unreviewed + '</span>' : '');
  }

  const content = document.getElementById('main-content');
  switch (currentTab) {
    case 'overview': content.innerHTML = renderOverview(p); break;
    case 'sales': content.innerHTML = renderSales(p); break;
    case 'discovery': content.innerHTML = renderDiscovery(p); break;
    case 'shotlist': content.innerHTML = renderShotList(p); break;
    case 'shoot': content.innerHTML = renderShootDay(p); break;
    case 'post': content.innerHTML = renderPost(p); break;
    case 'delivery': content.innerHTML = renderDelivery(p); break;
    case 'comms': content.innerHTML = renderComms(p); break;
    case 'changes': content.innerHTML = renderChanges(p); break;
    case 'share': content.innerHTML = renderShare(p); break;
    default: content.innerHTML = renderOverview(p);
  }
}

function switchProjectTab(tab, btn) {
  if (sharedMode) {
    currentTab = tab;
    document.querySelectorAll('#project-tabs .tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    renderSharedView();
    return;
  }
  if (currentProjectId) {
    currentTab = tab;
    location.hash = '#project/' + currentProjectId + '/' + tab;
  }
}

// OVERVIEW TAB
// ══════════════════��════════════════════

function renderOverview(p) {
  const stage = p.meta.currentStage || 0;
  let html = '';

  // Stage stepper
  html += '<div class="stepper">';
  STAGE_NAMES.forEach((name, i) => {
    if (i > 0) html += '<span class="step-arrow">&#8594;</span>';
    const cls = i < stage ? 'done' : (i === stage ? 'current' : '');
    html += `<div class="step ${cls}" onclick="setStage(${i})">${i < stage ? '&#10003; ' : ''}${name}</div>`;
  });
  html += '</div>';

  // Key details card
  html += '<div class="card card-accent mb-12"><div class="label mb-8">Project Details</div>';
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  html += detailRow('Client', p.meta.clientName);
  html += detailRow('Business', p.meta.businessName);
  html += detailRow('Shoot Type', p.meta.shootType);
  html += detailRow('Date', fmtDate(p.stage2_preproduction.header.date));
  html += detailRow('Lead', p.stage2_preproduction.header.crew.lead);
  html += detailRow('Second Shooter', p.stage2_preproduction.header.crew.second || '—');
  html += detailRow('Time', (p.stage2_preproduction.header.timeRange.start ? fmtTime(p.stage2_preproduction.header.timeRange.start) + ' – ' + fmtTime(p.stage2_preproduction.header.timeRange.end) : '—'));
  html += '</div>';
  html += '<div class="flex gap-8 mt-12"><button class="btn-ghost btn-sm" onclick="openEditProjectModal()">Edit Details</button>';
  if (p.meta.status === 'active') html += '<button class="btn-ghost btn-sm btn-danger" onclick="archiveProject()">Archive</button>';
  else html += '<button class="btn-ghost btn-sm" onclick="unarchiveProject()">Reactivate</button>';
  html += '</div></div>';

  // Shot list summary
  const aCount = countAShots(p);
  const bCount = countBShots(p);
  const doneCount = countDoneShots(p);
  if (aCount + bCount > 0) {
    html += '<div class="card mb-12"><div class="label mb-8">Shot List</div>';
    html += '<div class="flex gap-12 mb-8">';
    html += `<div class="sl-stat"><div class="sl-stat-num">${aCount}</div><div class="sl-stat-label">A-Roll</div></div>`;
    html += `<div class="sl-stat"><div class="sl-stat-num">${bCount}</div><div class="sl-stat-label">B-Roll</div></div>`;
    html += `<div class="sl-stat"><div class="sl-stat-num">${doneCount}</div><div class="sl-stat-label">Done</div></div>`;
    html += '</div>';
    const total = aCount + bCount;
    const pct = total > 0 ? Math.round(doneCount / total * 100) : 0;
    html += `<div class="progress"><div class="progress-bar" style="width:${pct}%"></div></div>`;
    html += `<div class="dim" style="font-size:11px;text-align:right;margin-top:4px;font-family:'DM Mono',monospace">${pct}% complete</div>`;
    html += '</div>';
  }

  return html;
}

function detailRow(label, value) {
  return `<div style="padding:4px 0"><span class="dim" style="font-size:11px">${label}:</span> <span style="font-size:13px">${esc(value || '—')}</span></div>`;
}

function setStage(i) {

// SHOT COUNTS
// ══════════════════���════════════════════

function countAShots(p) {
  let c = 0;
  (p.stage2_preproduction.aroll.blocks || []).forEach(b => c += (b.shots || []).length);
  return c;
}

function countBShots(p) {
  let c = 0;
  (p.stage2_preproduction.broll.categories || []).forEach(cat => c += (cat.shots || []).length);
  return c;
}

function countDoneShots(p) {
  let c = 0;
  (p.stage2_preproduction.aroll.blocks || []).forEach(b => (b.shots || []).forEach(s => { if (s.done) c++; }));
  (p.stage2_preproduction.broll.categories || []).forEach(cat => (cat.shots || []).forEach(s => { if (s.done) c++; }));
  return c;
}

function countADone(p) {
  let c = 0;
  (p.stage2_preproduction.aroll.blocks || []).forEach(b => (b.shots || []).forEach(s => { if (s.done) c++; }));
  return c;
}

function countBDone(p) {
  let c = 0;
  (p.stage2_preproduction.broll.categories || []).forEach(cat => (cat.shots || []).forEach(s => { if (s.done) c++; }));
  return c;
}

// ══════��════════════════════════════════
// SHOT LIST TAB (The Big One)
// ���══════════════════════════════════════

let slActivePanel = 'aroll';
let brollFilter = 'all';

function renderShotList(p) {
  const pre = p.stage2_preproduction;
  const h = pre.header;
  const aTotal = countAShots(p);
  const bTotal = countBShots(p);
  const aDone = countADone(p);
  const bDone = countBDone(p);

  let html = '';

  // Shot list header
  html += '<div class="sl-header"><div class="flex-between flex-wrap gap-12">';
  html += '<div>';
  html += '<div class="sl-eyebrow">Bright Tsar Studios — Shoot Shotlist</div>';
  html += `<div class="sl-title">${esc(h.clientName || p.meta.clientName || 'Untitled')}${h.date ? ' &middot; ' + fmtDate(h.date) : ''}</div>`;
  html += `<div class="sl-meta">${esc(h.crew.lead || 'Sev')} (A-Roll lead)${h.crew.second ? ' + ' + esc(h.crew.second) + ' (B-Roll)' : ''}`;
  if (h.timeRange.start) html += ` &middot; ${fmtTime(h.timeRange.start)} to ${fmtTime(h.timeRange.end)}${h.hardStop ? ' hard stop' : ''}`;
  if (h.shootType) html += ` &middot; ${esc(h.shootType)}`;
  html += '</div></div>';
  html += '<div class="sl-stats">';
  html += `<div class="sl-stat"><div class="sl-stat-num">${aTotal}</div><div class="sl-stat-label">A-Roll</div></div>`;
  html += `<div class="sl-stat"><div class="sl-stat-num">${bTotal}</div><div class="sl-stat-label">B-Roll</div></div>`;
  html += `<div class="sl-stat"><div class="sl-stat-num">${aDone + bDone}</div><div class="sl-stat-label">Done</div></div>`;
  html += '</div></div></div>';

  // Sub-tabs: A-Roll / B-Roll
  html += '<div class="sl-tabs">';
  html += `<button class="sl-tab${slActivePanel === 'aroll' ? ' active' : ''}" onclick="switchSLPanel('aroll')">${esc(h.crew.lead || 'Sev')} — A-Roll</button>`;
  html += `<button class="sl-tab${slActivePanel === 'broll' ? ' active' : ''}" onclick="switchSLPanel('broll')">${h.crew.second ? esc(h.crew.second) : 'Second'} �� B-Roll</button>`;
  html += '</div>';

  // A-Roll Panel
  html += `<div class="sl-panel${slActivePanel === 'aroll' ? ' active' : ''}" id="sl-aroll">`;
  const aPct = aTotal > 0 ? Math.round(aDone / aTotal * 100) : 0;
  html += `<div class="sl-progress-wrap"><div class="sl-progress-bar" style="width:${aPct}%"></div></div>`;
  html += `<div class="sl-progress-label">${aDone} / ${aTotal} shots checked</div>`;

  pre.aroll.blocks.forEach((block, bi) => {
    html += renderABlock(block, bi);
  });

  html += `<div class="add-row" onclick="openAddBlockModal()">+ Add time block</div>`;
  html += '</div>';

  // B-Roll Panel
  html += `<div class="sl-panel${slActivePanel === 'broll' ? ' active' : ''}" id="sl-broll">`;
  const bPct = bTotal > 0 ? Math.round(bDone / bTotal * 100) : 0;
  html += `<div class="sl-progress-wrap"><div class="sl-progress-bar" style="width:${bPct}%"></div></div>`;
  html += `<div class="sl-progress-label">${bDone} / ${bTotal} shots checked</div>`;

  // Filter row
  html += '<div class="sl-filters">';
  html += `<div class="sl-fbtn${brollFilter === 'all' ? ' on' : ''}" onclick="filterBroll('all')">All</div>`;
  BROLL_CATS.forEach(cat => {
    html += `<div class="sl-fbtn${brollFilter === cat.key ? ' on' : ''}" onclick="filterBroll('${cat.key}')">${cat.title}</div>`;
  });
  html += '</div>';

  pre.broll.categories.forEach((cat, ci) => {
    if (brollFilter !== 'all' && cat.key !== brollFilter) return;
    html += renderBCategory(cat, ci);
  });

  html += `<div class="add-row" onclick="openAddCategoryModal()">+ Add B-Roll category</div>`;
  html += '</div>';

  return html;
}

function switchSLPanel(panel) {
  slActivePanel = panel;
  const p = getProject(currentProjectId);
  if (p) document.getElementById('main-content').innerHTML = renderShotList(p);
}

function filterBroll(key) {
  brollFilter = key;
  const p = getProject(currentProjectId);
  if (p) document.getElementById('main-content').innerHTML = renderShotList(p);
}

function renderABlock(block, bi) {
  let html = '<div class="sl-block">';
  html += '<div class="sl-block-head">';
  if (block.time) html += `<span class="sl-block-time">${esc(fmtTime(block.time) || block.time)}</span>`;
  html += `<span class="sl-block-tag bt-${block.type}">${BLOCK_TYPE_LABELS[block.type] || block.type}</span>`;
  html += `<span class="sl-block-title">${esc(block.title)}</span>`;
  if (block.desc) html += `<span class="sl-block-desc">${esc(block.desc)}</span>`;
  html += `<button class="btn-icon" onclick="openEditBlockModal(${bi})" title="Edit block">&#9998;</button>`;
  html += `<button class="btn-icon" onclick="deleteBlock(${bi})" title="Remove block" style="color:var(--red)">&#10005;</button>`;
  html += '</div>';

  html += '<div class="sl-shots">';
  (block.shots || []).forEach((shot, si) => {
    html += renderShot(shot, 'a', bi, si);
  });
  html += '</div>';

  html += `<div class="add-row" onclick="openAddShotModal('a',${bi})">+ Add shot to ${esc(block.title)}</div>`;
  html += '</div>';
  return html;
}

function renderBCategory(cat, ci) {
  let html = '<div class="sl-bcat">';
  html += '<div class="sl-bcat-head">';
  html += `<span class="sl-bcat-icon">${cat.icon}</span>`;
  html += `<div><div class="sl-bcat-title">${esc(cat.title)}</div>`;
  if (cat.note) html += `<div class="sl-bcat-note">${esc(cat.note)}</div>`;
  html += '</div>';
  const count = (cat.shots || []).length;
  html += `<span class="sl-bcat-count">${count} shot${count !== 1 ? 's' : ''}</span>`;
  html += `<button class="btn-icon" onclick="openEditCategoryModal(${ci})" title="Edit category">&#9998;</button>`;
  html += `<button class="btn-icon" onclick="deleteCategory(${ci})" title="Remove category" style="color:var(--red)">&#10005;</button>`;
  html += '</div>';

  html += '<div class="sl-shots">';
  (cat.shots || []).forEach((shot, si) => {
    html += renderShot(shot, 'b', ci, si);
  });
  html += '</div>';

  html += `<div class="add-row" onclick="openAddShotModal('b',${ci})">+ Add shot</div>`;
  html += '</div>';
  return html;
}

function renderShot(shot, type, parentIdx, shotIdx) {
  const done = shot.done ? ' done' : '';
  let html = `<div class="sl-shot${done}" onclick="toggleShot('${type}',${parentIdx},${shotIdx})">`;
  html += `<div class="sl-shot-check"><input type="checkbox" ${shot.done ? 'checked' : ''} onclick="event.stopPropagation()"></div>`;
  html += `<div class="sl-shot-num">${esc(shot.id)}</div>`;
  html += '<div class="sl-shot-body">';
  html += `<div class="sl-shot-text">${esc(shot.text)}</div>`;
  if (shot.note) html += `<div class="sl-shot-note">${esc(shot.note)}</div>`;
  if (shot.tags && shot.tags.length) {
    html += '<div class="sl-shot-tags">';
    shot.tags.forEach(t => { html += `<span class="stag stag-${t}">${TAG_LABELS[t] || t}</span>`; });
    html += '</div>';
  }
  if (shot.doneAt) html += `<div class="sl-shot-ts">&#10003; ${new Date(shot.doneAt).toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}</div>`;
  html += `<div class="flex gap-4 mt-8">`;
  html += `<button class="btn-icon btn-sm" onclick="event.stopPropagation();openEditShotModal('${type}',${parentIdx},${shotIdx})" title="Edit">&#9998;</button>`;
  html += `<button class="btn-icon btn-sm" onclick="event.stopPropagation();deleteShot('${type}',${parentIdx},${shotIdx})" title="Delete" style="color:var(--red)">&#10005;</button>`;
  html += '</div>';
  html += '</div></div>';
  return html;
}

// ═══════════════════════════════════════
// SHOT INTERACTIONS
// ═════════════════════════���═════════════

function toggleShot(type, parentIdx, shotIdx) {
  const p = getProject(currentProjectId);
  if (!p) return;
  let shot;
  if (type === 'a') {
    shot = p.stage2_preproduction.aroll.blocks[parentIdx].shots[shotIdx];
  } else {
    shot = p.stage2_preproduction.broll.categories[parentIdx].shots[shotIdx];
  }
  shot.done = !shot.done;
  shot.doneAt = shot.done ? nowISO() : null;
  shot.doneBy = shot.done ? 'sev' : null;
  p.updatedAt = nowISO();
  save();
  renderProjectView();
}

function deleteShot(type, parentIdx, shotIdx) {
  const p = getProject(currentProjectId);
  if (!p) return;
  if (type === 'a') {
    p.stage2_preproduction.aroll.blocks[parentIdx].shots.splice(shotIdx, 1);
  } else {
    p.stage2_preproduction.broll.categories[parentIdx].shots.splice(shotIdx, 1);
  }
  renumberShots(p);
  p.updatedAt = nowISO();
  save();
  renderProjectView();
  toast('Shot removed');
}

function deleteBlock(bi) {
  const p = getProject(currentProjectId);
  if (!p) return;
  p.stage2_preproduction.aroll.blocks.splice(bi, 1);
  renumberShots(p);
  p.updatedAt = nowISO();
  save();
  renderProjectView();
  toast('Block removed');
}

function deleteCategory(ci) {
  const p = getProject(currentProjectId);
  if (!p) return;
  p.stage2_preproduction.broll.categories.splice(ci, 1);
  renumberShots(p);
  p.updatedAt = nowISO();
  save();
  renderProjectView();
  toast('Category removed');
}

function renumberShots(p) {
  let aNum = 1;
  p.stage2_preproduction.aroll.blocks.forEach(b => {
    (b.shots || []).forEach(s => {
      s.id = 'A' + String(aNum).padStart(2, '0');
      aNum++;
    });
  });
  let bNum = 1;
  p.stage2_preproduction.broll.categories.forEach(cat => {
    (cat.shots || []).forEach(s => {
      s.id = 'B' + String(bNum).padStart(2, '0');
      bNum++;
    });
  });
}

function fillCatDefaults() {
  const key = document.getElementById('ac-key').value;
  const cat = BROLL_CATS.find(c => c.key === key);
  if (cat) {
    document.getElementById('ac-title').value = cat.title + ' — ' + cat.note;
  } else {
    document.getElementById('ac-title').value = '';
  }
}

function addCategory() {
  const p = getProject(currentProjectId);
  if (!p) return;
  const key = document.getElementById('ac-key').value;
  const cat = BROLL_CATS.find(c => c.key === key);
  p.stage2_preproduction.broll.categories.push({
    id: uid(),
    key: key === 'custom' ? 'custom-' + Date.now() : key,
    icon: cat ? cat.icon : '&#128247;',
    title: document.getElementById('ac-title').value.trim() || 'New Category',
    note: document.getElementById('ac-note').value.trim(),
    shots: []

// ═══════════════════════════════════════
// SHOOT DAY — LIVE MODE
// ═══════════════════════════════════════

let liveListener = null;
let presenceRef = null;
let presenceInterval = null;
let connectedDevices = {};
let deviceId = 'dev-' + (localStorage.getItem('bts-device-id') || (() => { const id = Math.random().toString(36).substr(2, 8); localStorage.setItem('bts-device-id', id); return id; })());
let liveSlPanel = 'aroll';

function renderShootDay(p) {
  const shoot = p.stage3_shoot;
  const pre = p.stage2_preproduction;
  const h = pre.header;
  const aTotal = countAShots(p);
  const bTotal = countBShots(p);
  const aDone = countADone(p);
  const bDone = countBDone(p);
  const total = aTotal + bTotal;
  const done = aDone + bDone;

  let html = '';

  // Live mode toggle
  if (!shoot.liveMode) {
    html += '<div class="card card-accent text-center" style="padding:32px">';
    html += '<div style="font-size:40px;margin-bottom:12px">&#127916;</div>';
    html += '<div style="font-size:18px;font-weight:600;margin-bottom:6px">Shoot Day — Live Mode</div>';
    html += `<div class="dim mb-16">Real-time shot list synced across all connected devices.<br>${aTotal} A-Roll + ${bTotal} B-Roll shots ready.</div>`;
    if (aTotal + bTotal === 0) {
      html += '<div class="dim" style="color:var(--red);margin-bottom:12px">Add shots to your shot list before going live.</div>';
    } else {
      html += '<button class="btn" style="font-size:15px;padding:12px 32px" onclick="startLiveMode()">Go Live</button>';
    }
    html += '</div>';
    return html;
  }

  // ── LIVE MODE ACTIVE ──

  // Live header bar
  html += '<div class="card" style="border-color:var(--green);border-width:2px;padding:12px 16px">';
  html += '<div class="flex-between flex-wrap gap-8">';
  html += '<div class="flex-center gap-8">';
  html += '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--green);animation:pulse 2s infinite"></span>';
  html += '<span style="font-weight:600;color:var(--green);font-size:13px">LIVE</span>';
  html += `<span class="dim" style="font-size:12px">${esc(h.clientName || p.meta.clientName)}</span>`;
  if (h.date) html += `<span class="dim" style="font-size:11px;font-family:'DM Mono',monospace">${fmtDate(h.date)}</span>`;
  html += '</div>';
  html += '<div class="flex-center gap-8">';
  html += `<span style="font-family:'DM Mono',monospace;font-size:18px;font-weight:700;color:var(--gold)">${done}/${total}</span>`;
  html += `<span class="dim" style="font-size:11px">${total > 0 ? Math.round(done/total*100) : 0}%</span>`;
  html += `<button class="btn-ghost btn-sm btn-danger" onclick="endLiveMode()">End</button>`;
  html += '</div></div>';
  // Full progress bar
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  html += `<div class="sl-progress-wrap" style="margin-top:10px"><div class="sl-progress-bar" style="width:${pct}%;background:var(--green)"></div></div>`;
  html += '</div>';

  // Connected devices
  html += '<div class="flex gap-8 flex-wrap mb-12" style="margin-top:12px">';
  const devs = Object.values(connectedDevices);
  if (devs.length > 0) {
    devs.forEach(d => {
      const ago = Math.round((Date.now() - d.lastSeen) / 1000);
      const online = ago < 45;
      html += `<span class="tag" style="background:${online ? 'var(--green-dim)' : 'rgba(125,133,144,0.15)'};color:${online ? 'var(--green)' : 'var(--dim)'}">${esc(d.label)}${online ? '' : ' (offline)'}</span>`;
    });
  }
  html += '</div>';

  // Sub-tabs
  html += '<div class="sl-tabs">';
  html += `<button class="sl-tab${liveSlPanel === 'aroll' ? ' active' : ''}" onclick="switchLivePanel('aroll')">${esc(h.crew.lead || 'Sev')} — A-Roll <span style="font-family:'DM Mono',monospace;font-size:11px;margin-left:4px;color:var(--dim)">${aDone}/${aTotal}</span></button>`;
  html += `<button class="sl-tab${liveSlPanel === 'broll' ? ' active' : ''}" onclick="switchLivePanel('broll')">${h.crew.second ? esc(h.crew.second) : 'B-Roll'} <span style="font-family:'DM Mono',monospace;font-size:11px;margin-left:4px;color:var(--dim)">${bDone}/${bTotal}</span></button>`;
  html += '</div>';

  // A-Roll live panel
  html += `<div class="sl-panel${liveSlPanel === 'aroll' ? ' active' : ''}">`;
  pre.aroll.blocks.forEach((block, bi) => {
    const blockDone = (block.shots || []).filter(s => s.done).length;
    const blockTotal = (block.shots || []).length;
    const allDone = blockDone === blockTotal && blockTotal > 0;
    html += '<div class="sl-block">';
    html += '<div class="sl-block-head">';
    if (block.time) html += `<span class="sl-block-time">${esc(fmtTime(block.time) || block.time)}</span>`;
    html += `<span class="sl-block-tag bt-${block.type}">${BLOCK_TYPE_LABELS[block.type] || block.type}</span>`;
    html += `<span class="sl-block-title">${esc(block.title)}</span>`;
    html += `<span class="sl-block-desc" style="font-family:'DM Mono',monospace;${allDone ? 'color:var(--green)' : ''}">${blockDone}/${blockTotal}</span>`;
    html += '</div><div class="sl-shots">';
    (block.shots || []).forEach((shot, si) => {
      html += renderLiveShot(shot, 'a', bi, si);
    });
    html += '</div>';
    html += `<div class="add-row" onclick="openLiveAddShotModal('a',${bi})">+ Add shot on the fly</div>`;
    html += '</div>';
  });
  html += '</div>';

  // B-Roll live panel
  html += `<div class="sl-panel${liveSlPanel === 'broll' ? ' active' : ''}">`;
  html += '<div class="sl-filters">';
  html += `<div class="sl-fbtn${brollFilter === 'all' ? ' on' : ''}" onclick="filterBrollLive('all')">All</div>`;
  BROLL_CATS.forEach(cat => {
    html += `<div class="sl-fbtn${brollFilter === cat.key ? ' on' : ''}" onclick="filterBrollLive('${cat.key}')">${cat.title}</div>`;
  });
  html += '</div>';

  pre.broll.categories.forEach((cat, ci) => {
    if (brollFilter !== 'all' && cat.key !== brollFilter) return;
    const catDone = (cat.shots || []).filter(s => s.done).length;
    const catTotal = (cat.shots || []).length;
    html += '<div class="sl-bcat">';
    html += '<div class="sl-bcat-head">';
    html += `<span class="sl-bcat-icon">${cat.icon}</span>`;
    html += `<div><div class="sl-bcat-title">${esc(cat.title)}</div></div>`;
    html += `<span class="sl-bcat-count" style="font-family:'DM Mono',monospace">${catDone}/${catTotal}</span>`;
    html += '</div><div class="sl-shots">';
    (cat.shots || []).forEach((shot, si) => {
      html += renderLiveShot(shot, 'b', ci, si);
    });
    html += '</div>';
    html += `<div class="add-row" onclick="openLiveAddShotModal('b',${ci})">+ Add shot on the fly</div>`;
    html += '</div>';
  });
  html += '</div>';

  return html;
}

function renderLiveShot(shot, type, parentIdx, shotIdx) {
  const done = shot.done ? ' done' : '';
  let html = `<div class="sl-shot${done}" onclick="toggleLiveShot('${type}',${parentIdx},${shotIdx})" style="cursor:pointer">`;
  html += `<div class="sl-shot-check"><input type="checkbox" ${shot.done ? 'checked' : ''} onclick="event.stopPropagation()"></div>`;
  html += `<div class="sl-shot-num">${esc(shot.id)}</div>`;
  html += '<div class="sl-shot-body">';
  html += `<div class="sl-shot-text">${esc(shot.text)}</div>`;
  if (shot.note) html += `<div class="sl-shot-note">${esc(shot.note)}</div>`;
  if (shot.tags && shot.tags.length) {
    html += '<div class="sl-shot-tags">';
    shot.tags.forEach(t => { html += `<span class="stag stag-${t}">${TAG_LABELS[t] || t}</span>`; });
    html += '</div>';
  }
  if (shot.doneAt) {
    html += `<div class="sl-shot-ts">&#10003; ${new Date(shot.doneAt).toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
    if (shot.doneBy) html += ` — ${esc(shot.doneBy)}`;
    html += '</div>';
  }
  html += '</div></div>';
  return html;
}

function switchLivePanel(panel) {
  liveSlPanel = panel;
  const p = getProject(currentProjectId);
  if (p) document.getElementById('main-content').innerHTML = renderShootDay(p);
}

function filterBrollLive(key) {
  brollFilter = key;
  const p = getProject(currentProjectId);
  if (p) document.getElementById('main-content').innerHTML = renderShootDay(p);
}

function toggleLiveShot(type, parentIdx, shotIdx) {
  const p = getProject(currentProjectId);
  if (!p) return;
  let shot;
  if (type === 'a') shot = p.stage2_preproduction.aroll.blocks[parentIdx].shots[shotIdx];
  else shot = p.stage2_preproduction.broll.categories[parentIdx].shots[shotIdx];

  shot.done = !shot.done;
  shot.doneAt = shot.done ? nowISO() : null;
  shot.doneBy = shot.done ? (p.stage2_preproduction.header.crew.lead || 'Sev') : null;
  p.updatedAt = nowISO();
  save();
  document.getElementById('main-content').innerHTML = renderShootDay(p);
}

function openLiveAddShotModal(type, parentIdx) {
  const body = `
    <div class="form-group"><label class="form-label">Shot Description *</label><textarea class="textarea" id="la-text" rows="2" placeholder="Quick description..."></textarea></div>
    <div class="form-group"><label class="form-label">Notes</label><textarea class="textarea" id="la-note" rows="1" placeholder="Optional notes..."></textarea></div>

      <div class="tag-selector" id="la-tags">
        ${SHOT_TAGS.map(t => `<div class="tag-opt" data-tag="${t}" onclick="this.classList.toggle('selected')">${TAG_LABELS[t]}</div>`).join('')}
      </div>
    </div>
  `;
  const foot = `<button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="addLiveShot('${type}',${parentIdx})">Add Shot</button>`;
  openModal('Add Shot (Live)', body, foot);
  setTimeout(() => document.getElementById('la-text').focus(), 100);
}

function addLiveShot(type, parentIdx) {
  const p = getProject(currentProjectId);
  if (!p) return;
  const text = document.getElementById('la-text').value.trim();
  if (!text) { toast('Description required'); return; }
  const tags = Array.from(document.querySelectorAll('#la-tags .tag-opt.selected')).map(el => el.dataset.tag);

  const shot = {
    id: 'LIVE', text, note: document.getElementById('la-note').value.trim(),
    tags, done: false, doneAt: null, doneBy: null, order: 0
  };

  if (type === 'a') {
    const block = p.stage2_preproduction.aroll.blocks[parentIdx];
    shot.order = (block.shots || []).length;
    block.shots.push(shot);
  } else {
    const cat = p.stage2_preproduction.broll.categories[parentIdx];
    shot.category = cat.key;
    shot.order = (cat.shots || []).length;
    cat.shots.push(shot);
  }
  renumberShots(p);
  p.updatedAt = nowISO();
  save();
  closeModal();
  document.getElementById('main-content').innerHTML = renderShootDay(p);
  toast('Shot added');
}

// ── Live mode controls ──

function startLiveMode() {
  const p = getProject(currentProjectId);
  if (!p) return;
  p.stage3_shoot.liveMode = true;
  p.stage3_shoot.startedAt = nowISO();
  p.meta.currentStage = Math.max(p.meta.currentStage, 3);
  p.updatedAt = nowISO();
  save();
  startLiveSync(p);
  renderProjectView();
  toast('Live mode started');
}

function endLiveMode() {
  const p = getProject(currentProjectId);
  if (!p) return;
  p.stage3_shoot.liveMode = false;
  p.stage3_shoot.endedAt = nowISO();
  p.updatedAt = nowISO();
  save();
  stopLiveSync();
  renderProjectView();
  toast('Live mode ended');
}

// ── Firebase real-time sync ──

function startLiveSync(p) {
  if (!vaultPath) return;
  stopLiveSync();

  const projectPath = vaultPath + '/projects/' + p.id + '/data';

  // Listen for remote changes
  liveListener = db.ref(projectPath).on('value', (snap) => {
    const remote = snap.val();
    if (!remote) return;
    const local = getProject(p.id);
    if (!local) return;

    // Only merge if remote is newer
    if (remote.updatedAt > local.updatedAt) {
      fixProject(remote);
      const idx = projects.findIndex(x => x.id === p.id);
      if (idx >= 0) projects[idx] = remote;
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(projects)); } catch (e) {}

      // Re-render if we're still on shoot day
      if (currentProjectId === p.id && currentTab === 'shoot') {
        document.getElementById('main-content').innerHTML = renderShootDay(remote);
      }
    }
  });

  // Register device presence
  const presPath = vaultPath + '/projects/' + p.id + '/presence/' + deviceId;
  presenceRef = db.ref(presPath);
  presenceRef.set({
    label: p.stage2_preproduction.header.crew.lead || 'Sev',
    lastSeen: Date.now(),
    role: 'owner'
  });
  presenceRef.onDisconnect().remove();

  // Heartbeat every 15 seconds
  presenceInterval = setInterval(() => {
    if (presenceRef) presenceRef.update({ lastSeen: Date.now() });
  }, 15000);

  // Listen for other devices
  db.ref(vaultPath + '/projects/' + p.id + '/presence').on('value', (snap) => {
    connectedDevices = snap.val() || {};
    // Re-render device roster if on shoot tab
    if (currentProjectId === p.id && currentTab === 'shoot') {
      const p2 = getProject(p.id);
      if (p2) document.getElementById('main-content').innerHTML = renderShootDay(p2);
    }
  });
}

function stopLiveSync() {
  if (liveListener && currentProjectId && vaultPath) {
    db.ref(vaultPath + '/projects/' + currentProjectId + '/data').off('value', liveListener);
    liveListener = null;
  }
  if (presenceRef) {
    presenceRef.remove();
    presenceRef = null;
  }
  if (presenceInterval) {
    clearInterval(presenceInterval);
    presenceInterval = null;
  }
  if (currentProjectId && vaultPath) {
    db.ref(vaultPath + '/projects/' + currentProjectId + '/presence').off('value');
  }
  connectedDevices = {};
}

const SALES_SCENES = {"open":{"id":"open","tab":"Call","title":"Opening","tactic":"Accusation Audit + Late Night FM Voice","voss":"Accusation audit disarms before they can put a wall up. Slow your pace by 20%. Don't pitch yet.","script":"Hey [Name], good to finally connect. So before I say anything — I just want to be upfront. This isn't one of those calls where I pitch you for 45 minutes. I just want to ask you a few questions, understand what's actually going on, and if there's something here that makes sense for you — great. If not, totally fine. Does that work?","note":"Pause after 'Does that work?' Let them confirm. Don't fill the silence.","options":[{"label":"Yeah, that sounds good","next":"qualify"},{"label":"What is this about exactly?","next":"what_is_this"}]},"what_is_this":{"id":"what_is_this","tab":"Call","title":"They want context first","tactic":"Label + Brief Frame","voss":"Don't defend. Label their need for clarity, then give a one-liner and redirect to qualify.","script":"Completely fair. I work with service-based business owners to build a content system that actually brings in leads — without relying on agencies or ads. I've got a 2-day online workshop and a monthly advisory setup. But before I go into any of that — tell me what's actually going on with your content right now. What made you get on this call?","note":"One sentence on what you do. Then flip it straight back to them.","options":[{"label":"I'm starting from zero","next":"qualify_zero"},{"label":"I'm creating but nothing's working","next":"qualify_stuck"},{"label":"I've got something but want to scale it","next":"qualify_scale"},{"label":"I just want someone to handle it","next":"qualify_dfy"}]},"qualify":{"id":"qualify","tab":"Call","title":"Qualify — Open Question","tactic":"Calibrated Question","voss":"Open with 'What' not 'Are you' — calibrated questions can't be answered yes/no and invite them to share.","script":"So tell me — what's actually going on with your content right now?
