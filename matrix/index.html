<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Matrix · Sev's Advisory</title>
<meta http-equiv="refresh" content="0; url=clients/">
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="stylesheet" href="_assets/styles.css">
<style>
.redirect-pad {
  min-height: 80vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 24px;
}
.redirect-pad a {
  font-family: var(--font-mono);
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--accent);
  border: 1px solid var(--accent-dim);
  padding: 14px 28px;
  text-decoration: none;
  transition: all 0.15s;
}
.redirect-pad a:hover {
  background: var(--accent);
  color: var(--bg);
}
</style>
</head>
<body class="view-client">
<div class="shell">
<div class="redirect-pad">
  <h1 class="client-name" style="font-size: 32px;">Content Matrix</h1>
  <p style="color: var(--text-dim); font-size: 14px;">Redirecting to client directory.</p>
  <a href="clients/">Open directory →</a>
</div>
</div>
