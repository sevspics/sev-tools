.input { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; width: 100%; font-size: 14px; }

.progress { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }

.flex { display: flex; }

.flex-center { display: flex; align-items: center; }
.gap-4 { gap: 4px; } .gap-8 { gap: 8px; } .gap-10 { gap: 10px; } .gap-12 { gap: 12px; }
.flex-1 { flex: 1; } .flex-wrap { flex-wrap: wrap; }
.mb-4 { margin-bottom: 4px; } .mb-8 { margin-bottom: 8px; } .mb-12 { margin-bottom: 12px; } .mb-16 { margin-bottom: 16px; }
.mt-8 { margin-top: 8px; } .mt-12 { margin-top: 12px; } .mt-16 { margin-top: 16px; }
.text-center { text-align: center; }

.checkbox { width: 20px; height: 20px; border-radius: 4px; border: 2px solid var(--border); background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.2s; }

.xp-popup { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--gold); color: var(--bg); padding: 8px 20px; border-radius: 8px; font-weight: 700; z-index: 999; animation: fadeUp 0.3s ease; box-shadow: 0 4px 20px var(--gold-glow); pointer-events: none; }

.section-divider { border-bottom: 1px solid var(--border); padding: 8px 0; }
.strikethrough { text-decoration: line-through; opacity: 0.5; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

.chart-bar-container { display: flex; align-items: flex-end; gap: 4px; height: 120px; }

@media (max-width: 500px) {

.pull-indicator { position:fixed;top:0;left:0;right:0;height:0;overflow:hidden;background:var(--bg2);z-index:50;display:flex;align-items:center;justify-content:center;transition:none;border-bottom:1px solid var(--border); }
.pull-indicator.releasing { transition:height 0.3s ease; }

<script>
// ===== FIREBASE =====
const firebaseConfig = {
  apiKey: "AIzaSyCZDHB2bOZ7XJfsdcQF_Jj8A_M8LuIE2ao",
  authDomain: "sev-command-centre.firebaseapp.com",
  databaseURL: "https://sev-command-centre-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sev-command-centre",
  storageBucket: "sev-command-centre.firebasestorage.app",
  messagingSenderId: "709383575800",
  appId: "1:709383575800:web:77642c1f5812eba050830d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let vaultPath = null;

async function hashPIN(pin) {
  const data = new TextEncoder().encode(pin);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

// ===== CONFIG =====
const STORAGE_KEY = "sev-command-centre-v4";
const HISTORY_KEY = "sev-history-v3";
const XP_VALUES = { action: 25, habit: 15, inbox_clear: 10, weekly_review: 100, deal_advance: 50, deal_close: 500, session_done: 30 };
const LEVELS = [
  { name: "Recruit", xp: 0 }, { name: "Operator", xp: 200 }, { name: "Strategist", xp: 500 },
  { name: "Commander", xp: 1000 }, { name: "Warlord", xp: 2000 }, { name: "Architect", xp: 3500 },
  { name: "Kingpin", xp: 5000 }, { name: "Legend", xp: 8000 }, { name: "Titan", xp: 12000 },
  { name: "Untouchable", xp: 20000 },
];
const STAGES = ["Lead", "Proposal Sent", "In Negotiation", "Verbal Yes", "Signed", "Collecting Revenue"];
const STAGE_COLORS = ["#6b7280", "#f59e0b", "#f97316", "#8b5cf6", "#22c55e", "#10b981"];
const REVIEW_ITEMS = [
  "Collect all loose papers, notes, and digital inputs into inbox",
  "Process inbox to zero: decide next action for every item",
  "Review all active opportunities: is the next action clear?",
  "Review 'Waiting For' list: follow up where needed",
  "Review upcoming calendar: any prep needed?",
  "Review 'Someday/Maybe': anything ready to activate?",
  "Ask: What went well this week?",
  "Ask: What held me back?",
  "Ask: What are the 3 highest-impact actions for next week?",
  "Update opportunity stages and notes",
];
const TAB_LIST = [
  { id: "dashboard", label: "HQ" }, { id: "projects", label: "Projects" }, { id: "opportunities", label: "Deals" },
  { id: "sessions", label: "Sessions" }, { id: "commissions", label: "Commissions" },
  { id: "actions", label: "Actions" }, { id: "habits", label: "Habits" },
  { id: "inbox", label: "Inbox" }, { id: "someday", label: "Someday" }, { id: "review", label: "Review" },
  { id: "debrief", label: "Debrief" }, { id: "history", label: "History" },
];

// ===== STATE =====
let state, history = [], currentTab = "dashboard", projectsSubTab = "professional";

function defaultState() {
  return {
    xp: 0, streak: 0, lastActiveDate: null,
    opportunities: [
      { id: "raswa", name: "RASWA 2026", stage: 1, notes: "127K views proof. Proposal delivered. Follow up.", monthlyValue: 5000, type: "deal" },
      { id: "goyojo", name: "GOYOJO Partnership", stage: 1, notes: "Tiers $2,750-$18K/mo + $12.5K China trip.", monthlyValue: 5500, type: "deal" },
      { id: "sabine-brandon", name: "Sabine x Brandon Dungeon", stage: 1, notes: "$4,600+GST design fees. Sabine's project.", monthlyValue: 0, type: "deal" },
      { id: "daecian", name: "Daecian (Retainer)", stage: 5, notes: "Proof-of-concept retainer.", monthlyValue: 2500, type: "client" },
      { id: "living-oceans", name: "Living Oceans", stage: 5, notes: "Active client.", monthlyValue: 0, type: "client" },
      { id: "jits-ai", name: "Jits AI", stage: 5, notes: "Active client.", monthlyValue: 0, type: "client" },
      { id: "ben-macca", name: "Ben Macca (Pro Bono)", stage: 5, notes: "Pro bono.", monthlyValue: 0, type: "pro-bono" },
    ],
    projects: [
      { id: "talktosev", name: "@talktosev Launch", category: "personal", notes: "Account creation, bio, Mitchell testimonial, lead magnet.", updates: [] },
      { id: "bts-exit", name: "BTS Exit", category: "personal", notes: "Clean separation before EOFY. Hursh advised.", updates: [] },
      { id: "ghl-brandon", name: "GoHighLevel Build (Brandon)", category: "professional", notes: "Landing page + VSL from session 2.", monthlyValue: 0, updates: [] },
      { id: "sevspics", name: "@sevspics Brand", category: "personal", notes: "Personal brand development.", updates: [] },
    ],
    weeklyActions: {}, habits: [
      { id: "h1", name: "Outreach calls/messages", target: 5, icon: "phone" },
      { id: "h2", name: "Content pieces created", target: 3, icon: "camera" },
      { id: "h3", name: "Client check-ins", target: 3, icon: "heart" },
      { id: "h4", name: "Exercise / movement", target: 5, icon: "bolt" },
      { id: "h5", name: "GTD inbox processed to zero", target: 5, icon: "inbox" },
      { id: "h6", name: "Revenue-generating action taken", target: 5, icon: "dollar" },
    ],
    habitLog: {}, inbox: [], weeklyReview: {}, waitingFor: [], somedayMaybe: [],
    sessions: [{ id: "abbey", name: "Abbey", package: "4-pack", price: 1200, sessionsTotal: 4, sessionsUsed: 3, notes: "3rd call done. 1 session remaining." }],
    commissions: [],
    debriefs: [],
  };
}

// ===== UTILS =====
function getWeekId() { const d = new Date(), j = new Date(d.getFullYear(),0,1), days = Math.floor((d-j)/864e5); return d.getFullYear()+"-W"+String(Math.ceil((days+j.getDay()+1)/7)).padStart(2,"0"); }
function getLevel(xp) { let l = LEVELS[0]; for (const lv of LEVELS) { if (xp >= lv.xp) l = lv; else break; } return l; }
function getNextLevel(xp) { for (const l of LEVELS) { if (xp < l.xp) return l; } return null; }
function fmtDate(iso) { if (!iso) return ""; return new Date(iso).toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"numeric"}); }
function uid() { return "id-" + Date.now() + "-" + Math.random().toString(36).substr(2,5); }

let saveTimer, historyTimer;
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  if (!vaultPath) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    db.ref(vaultPath + '/data').set(state).catch(e => console.warn('Firebase save failed:', e));
  }, 500);
}
function saveHistory() {
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch(e) {}
  if (!vaultPath) return;
  clearTimeout(historyTimer);
  historyTimer = setTimeout(() => {
    db.ref(vaultPath + '/history').set(history).catch(e => console.warn('Firebase history save failed:', e));
  }, 500);
}
function loadLocal() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) { state = JSON.parse(s); if (!state.sessions) state.sessions = defaultState().sessions; if (!state.commissions) state.commissions = []; if (!state.projects) state.projects = []; if (!state.debriefs) state.debriefs = []; } else state = defaultState(); } catch(e) { state = defaultState(); }
  try { const h = localStorage.getItem(HISTORY_KEY); if (h) history = JSON.parse(h); } catch(e) {}
}
function fixArrays(obj) {
  const keys = ['opportunities','inbox','habits','sessions','commissions','waitingFor','somedayMaybe','projects','debriefs'];
  keys.forEach(k => { if (obj[k] && !Array.isArray(obj[k])) obj[k] = Object.values(obj[k]); });
  if (obj.weeklyActions) {
    Object.keys(obj.weeklyActions).forEach(k => {
      if (obj.weeklyActions[k] && !Array.isArray(obj.weeklyActions[k])) obj.weeklyActions[k] = Object.values(obj.weeklyActions[k]);
    });
  }
  // Fix updates arrays inside projects
  if (obj.projects && Array.isArray(obj.projects)) {
    obj.projects.forEach(p => {
      if (p.updates && !Array.isArray(p.updates)) p.updates = Object.values(p.updates);
      if (!p.updates) p.updates = [];
    });
  }
}
async function loadFromFirebase() {
  const [dataSnap, histSnap] = await Promise.all([
    db.ref(vaultPath + '/data').once('value'),
    db.ref(vaultPath + '/history').once('value')
  ]);
  const fbData = dataSnap.val();
  const fbHist = histSnap.val();
  if (fbData) {
    state = fbData;
    const def = defaultState();
    if (!state.sessions) state.sessions = def.sessions;
    if (!state.commissions) state.commissions = [];
    if (!state.weeklyActions) state.weeklyActions = {};
    if (!state.habitLog) state.habitLog = {};
    if (!state.weeklyReview) state.weeklyReview = {};
    if (!state.inbox) state.inbox = [];
    if (!state.habits) state.habits = def.habits;
    if (!state.opportunities) state.opportunities = def.opportunities;
    if (!state.waitingFor) state.waitingFor = [];
    if (!state.somedayMaybe) state.somedayMaybe = [];
    if (!state.projects) state.projects = def.projects;
    if (!state.debriefs) state.debriefs = [];
    fixArrays(state);
  }
  if (fbHist) {
    history = Array.isArray(fbHist) ? fbHist : Object.values(fbHist);
  }
  return !!fbData;
}

// ===== BACKUP =====
function downloadBackup() {
  const backup = { state, history, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sev-command-centre-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  localStorage.setItem('sev-last-backup', new Date().toISOString().slice(0,10));
}
function checkAutoBackup() {
  if (window.innerWidth < 768) return;
  const today = new Date().toISOString().slice(0,10);
  if (localStorage.getItem('sev-last-backup') !== today) {
    setTimeout(downloadBackup, 2000);
  }
}

function trackStreak() {
  const today = new Date().toISOString().slice(0,10);
  if (state.lastActiveDate !== today) {
    const yesterday = new Date(Date.now()-864e5).toISOString().slice(0,10);
    state.streak = state.lastActiveDate === yesterday ? state.streak + 1 : 1;
    state.lastActiveDate = today;
  }
}

function addXP(amount, label) {
  state.xp = Math.max(0, state.xp + amount); trackStreak(); save();
  const el = document.getElementById("xp-popup");
  const sign = amount >= 0 ? "+" : "";
  el.textContent = sign + amount + " XP - " + label;
  el.classList.remove("hidden");
  setTimeout(() => el.classList.add("hidden"), 1500);
  render();
}

function progressHTML(pct, color, h) {
  h = h || 6;
  return '<div class="progress" style="height:'+h+'px"><div class="progress-bar" style="width:'+Math.min(pct||0,100)+'%;background:'+color+'"></div></div>';
}
function tagHTML(text, color) { return '<span class="tag" style="background:'+color+'22;color:'+color+'">'+esc(text)+'</span>'; }
function checkboxHTML(checked, onclick) { return '<div class="checkbox'+(checked?" checked":"")+'" onclick="'+onclick+'">'+(checked?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#0d1117" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>':'')+'</div>'; }
function esc(s) { if (!s) return ""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ===== COMPUTED =====
function computed() {
  if (!state.weeklyActions) state.weeklyActions = {};
  if (!state.habitLog) state.habitLog = {};
  if (!state.weeklyReview) state.weeklyReview = {};
  if (!state.habits) state.habits = defaultState().habits;
  if (!state.projects) state.projects = [];
  const allActs = []; Object.entries(state.weeklyActions).forEach(([oid,acts]) => { if (acts) (Array.isArray(acts)?acts:Object.values(acts)).forEach(a => allActs.push({...a, oppId: oid})); });
  const doneActs = allActs.filter(a=>a.done).length;
  const habDone = Object.values(state.habitLog).reduce((s,v)=>s+v,0);
  const habTarget = state.habits.reduce((s,h)=>s+h.target,0);
  const revDone = Object.values(state.weeklyReview).filter(Boolean).length;
  const score = Math.round(((doneActs/Math.max(allActs.length,1))*40)+((habDone/Math.max(habTarget,1))*30)+((revDone/REVIEW_ITEMS.length)*30));
  const confirmed = state.opportunities.filter(o=>o.stage>=4).reduce((s,o)=>s+(o.monthlyValue||0),0);
  const pipeline = state.opportunities.filter(o=>o.stage>=1&&o.stage<4).reduce((s,o)=>s+(o.monthlyValue||0),0);
  const projectsRevenue = state.projects.filter(p=>p.category==="professional").reduce((s,p)=>s+(p.monthlyValue||0),0);
  const commBuild = (state.commissions||[]).reduce((s,c)=>s+((c.buildCost*c.myShare)/100),0);
  const commMonthly = (state.commissions||[]).filter(c=>c.status==="active").reduce((s,c)=>s+((c.monthlyRetainer*c.retainerShare)/100),0);
  const sesRev = (state.sessions||[]).reduce((s,x)=>s+x.price,0);
  const sesLeft = (state.sessions||[]).reduce((s,x)=>s+(x.sessionsTotal-x.sessionsUsed),0);
  const activeProjects = state.projects.length;
  return { allActs, doneActs, habDone, habTarget, revDone, score, confirmed, pipeline, projectsRevenue, commBuild, commMonthly, sesRev, sesLeft, activeProjects };
}

// ===== RENDER =====
function render() {
  const c = computed(), lv = getLevel(state.xp), nlv = getNextLevel(state.xp);
  document.getElementById("header-week").textContent = "Week " + getWeekId() + " | Attention to Sales";
  document.getElementById("header-level").textContent = lv.name;
  document.getElementById("header-xp").textContent = state.xp.toLocaleString() + " XP";

  // Tabs
  let tabsH = "";
  TAB_LIST.forEach(t => {
    let badge = "";
    if (t.id === "inbox" && state.inbox.length > 0) badge = '<span class="badge">'+state.inbox.length+'</span>';
    tabsH += '<button class="tab'+(currentTab===t.id?" active":"")+'" onclick="switchTab(\''+t.id+'\')">'+t.label+badge+'</button>';
  });
  document.getElementById("tabs").innerHTML = tabsH;

  // Content
  const el = document.getElementById("content");
  switch(currentTab) {
    case "dashboard": el.innerHTML = renderDashboard(c, lv, nlv); break;
    case "projects": el.innerHTML = renderProjects(); break;
    case "opportunities": el.innerHTML = renderOpportunities(); break;
    case "sessions": el.innerHTML = renderSessions(c); break;
    case "commissions": el.innerHTML = renderCommissions(c); break;
    case "actions": el.innerHTML = renderActions(c); break;
    case "habits": el.innerHTML = renderHabits(); break;
    case "inbox": el.innerHTML = renderInbox(); break;
    case "someday": el.innerHTML = renderSomeday(); break;
    case "review": el.innerHTML = renderReview(c); break;
    case "debrief": el.innerHTML = renderDebrief(); break;
    case "history": el.innerHTML = renderHistory(); break;
  }
}

function switchTab(id) { currentTab = id; render(); }

// ===== DASHBOARD =====

        <div><span class="gold" style="font-weight:800;font-size:20px">${esc(lv.name)}</span><span class="dim" style="margin-left:12px;font-size:12px">LVL ${LEVELS.indexOf(lv)+1}</span></div>
        <div style="text-align:right"><span class="gold" style="font-weight:700">${state.xp.toLocaleString()} XP</span>${nlv?'<span class="dim" style="font-size:12px;margin-left:8px">/ '+nlv.xp.toLocaleString()+'</span>':''}</div>

        <div class="flex-center gap-4 dim">Week: <b style="color:${scoreCol}">${c.score}%</b></div>
      </div>
    </div>
    <div class="grid-stats">
      ${[{l:"Confirmed /mo",v:"$"+c.confirmed.toLocaleString(),c:"var(--green)"},{l:"Pipeline /mo",v:"$"+c.pipeline.toLocaleString(),c:"var(--yellow)"},{l:"Projects Rev /mo",v:"$"+c.projectsRevenue.toLocaleString(),c:"var(--cyan)"},{l:"Active Projects",v:c.activeProjects,c:"var(--cyan)"},{l:"Commissions /mo",v:"$"+Math.round(c.commMonthly).toLocaleString(),c:"var(--purple)"},{l:"Sessions Left",v:c.sesLeft,c:"var(--cyan)"},{l:"Actions",v:c.doneActs+"/"+c.allActs.length,c:"var(--gold)"},{l:"Inbox",v:state.inbox.length,c:state.inbox.length>5?"var(--red)":"var(--green)"}].map(s=>'<div class="card stat-card"><div class="stat-val" style="color:'+s.c+'">'+s.v+'</div><div class="stat-label">'+s.l+'</div></div>').join("")}
    </div>
    <div class="card">
      <div class="label">Quick Capture (GTD Inbox)</div>
      <div class="flex gap-8">
        <input class="input flex-1" id="dash-inbox" placeholder="What's on your mind? Get it out of your head..." onkeydown="if(event.key==='Enter')dashCapture()">
        <button class="btn" onclick="dashCapture()">Capture</button>
      </div>
    </div>
    <div class="card">
      <div class="label">This Week's Actions</div>
      ${c.allActs.length===0?'<div class="dim">No actions set. Go to Actions tab.</div>':c.allActs.slice(0,8).map((a,i)=>{
        const opp = state.opportunities.find(o=>o.id===a.oppId);
        return '<div class="flex-center gap-10 section-divider">'+checkboxHTML(a.done,"toggleAction('"+esc(a.oppId)+"','"+esc(a.id)+"')")+'<div style="flex:1;'+(a.done?'text-decoration:line-through;opacity:0.5':'')+'"><div>'+esc(a.text)+'</div><div class="dim" style="font-size:11px">'+(opp?esc(opp.name):'')+'</div></div></div>';
      }).join("")}
    </div>
    ${state.waitingFor.length?'<div class="card"><div class="label">Waiting For</div>'+state.waitingFor.map((w,i)=>'<div class="flex-between section-divider"><span>'+esc(w.text)+'</span><button class="btn-ghost btn-sm" onclick="resolveWaiting('+i+')">Done</button></div>').join("")+'</div>':''}

function dashCapture() {
  const el = document.getElementById("dash-inbox"); if (!el.value.trim()) return;
  state.inbox.push({ id: uid(), text: el.value.trim(), created: new Date().toISOString() });
  el.value = ""; trackStreak(); save(); render();
}

// ===== PROJECTS =====
function renderProjects() {
  if (!state.projects) state.projects = [];
  const professional = state.projects.filter(p => p.category === "professional");
  const personal = state.projects.filter(p => p.category === "personal");
  const isPro = projectsSubTab === "professional";

  let h = '<div class="flex-between mb-12"><h3>Projects</h3><button class="btn" onclick="document.getElementById(\'add-proj\').classList.toggle(\'hidden\')">+ Add Project</button></div>';

  // Sub-tabs
  h += '<div style="display:flex;gap:0;margin-bottom:16px;border:1px solid var(--border);border-radius:8px;overflow:hidden">';
  h += '<button onclick="switchProjectsSubTab(\'professional\')" style="flex:1;padding:10px 16px;font-size:13px;font-weight:'+(isPro?'700':'400')+';border:none;cursor:pointer;background:'+(isPro?'var(--green)':'var(--bg2)')+';color:'+(isPro?'var(--bg)':'var(--dim)')+';font-family:inherit;transition:all 0.2s">Professional ('+professional.length+')</button>';
  h += '<button onclick="switchProjectsSubTab(\'personal\')" style="flex:1;padding:10px 16px;font-size:13px;font-weight:'+(!isPro?'700':'400')+';border:none;cursor:pointer;background:'+(!isPro?'var(--cyan)':'var(--bg2)')+';color:'+(!isPro?'var(--bg)':'var(--dim)')+';font-family:inherit;transition:all 0.2s">Personal ('+personal.length+')</button>';
  h += '</div>';

  // Add project form
  h += '<div id="add-proj" class="card hidden" style="border-color:var(--gold-dim)">';
  h += '<div class="flex gap-8 mb-8"><select class="select flex-1" id="proj-cat"><option value="professional"'+(isPro?' selected':'')+'>Professional</option><option value="personal"'+(!isPro?' selected':'')+'>Personal</option></select></div>';
  h += '<input class="input mb-8" id="proj-name" placeholder="Project name">';
  h += '<textarea class="input mb-8" id="proj-notes" placeholder="Notes" rows="2"></textarea>';
  h += '<div id="proj-val-wrap" class="mb-8'+(isPro?'':' hidden')+'"><input class="input" id="proj-val" type="number" placeholder="$/mo (revenue)"></div>';
  h += '<button class="btn" onclick="addProject()">Add Project</button></div>';

  // Show the active sub-tab's projects
  if (isPro) {
    if (professional.length) {
      professional.forEach(proj => { h += renderProjectCard(proj, "var(--green)"); });
    } else {
      h += '<div class="text-center dim" style="padding:40px">No professional projects yet.</div>';
    }
  } else {
    if (personal.length) {
      personal.forEach(proj => { h += renderProjectCard(proj, "var(--cyan)"); });
    } else {
      h += '<div class="text-center dim" style="padding:40px">No personal projects yet.</div>';
    }
  }

  return h;
}
function switchProjectsSubTab(tab) { projectsSubTab = tab; render(); }

function renderProjectCard(proj, borderColor) {
  let h = '<div class="card" style="border-left:3px solid '+borderColor+'">';
  h += '<div class="flex-between mb-4"><div><span style="font-weight:600">'+esc(proj.name)+'</span>'+tagHTML(proj.category, borderColor)+'</div>';
  if (proj.category === "professional" && proj.monthlyValue > 0) {
    h += '<span class="gold" style="font-weight:600">$'+proj.monthlyValue.toLocaleString()+'/mo</span>';
  }
  h += '</div>';
  if (proj.notes) h += '<div class="dim mb-8" style="font-size:12px">'+esc(proj.notes)+'</div>';

  // Updates log toggle
  const updates = proj.updates || [];
  h += '<div class="flex gap-8 mb-8"><button class="btn-ghost btn-sm" onclick="toggleProjectUpdates(\''+proj.id+'\')">Updates ('+updates.length+')</button>';
  h += '<button class="btn-ghost btn-sm" onclick="showAddUpdate(\''+proj.id+'\')">+ Add Update</button>';
  h += '<button class="btn-ghost btn-sm" onclick="editProjectNotes(\''+proj.id+'\')">Edit</button>';
  if (proj.category === "personal") {
    h += '<button class="btn-ghost btn-sm" style="color:var(--green);border-color:rgba(34,197,94,0.3)" onclick="moveProjectCategory(\''+proj.id+'\',\'professional\')">Move to Professional</button>';
  } else {
    h += '<button class="btn-ghost btn-sm" style="color:var(--cyan);border-color:rgba(6,182,212,0.3)" onclick="moveProjectCategory(\''+proj.id+'\',\'personal\')">Move to Personal</button>';
  }
  h += '<button class="btn-ghost btn-sm btn-danger" onclick="removeProject(\''+proj.id+'\')">Remove</button></div>';

  // Inline add update input
  h += '<div id="add-update-'+proj.id+'" class="hidden mb-8"><div class="flex gap-8"><input class="input flex-1" id="update-text-'+proj.id+'" placeholder="What happened?" onkeydown="if(event.key===\'Enter\')addProjectUpdate(\''+proj.id+'\')"><button class="btn btn-sm" onclick="addProjectUpdate(\''+proj.id+'\')">Save</button></div></div>';

  // Updates list (collapsible)
  h += '<div id="updates-'+proj.id+'" class="hidden">';
  if (updates.length) {
    updates.slice().reverse().forEach(u => {
      h += '<div class="section-divider" style="padding:6px 0"><div class="dim" style="font-size:10px">'+fmtDate(u.date)+'</div><div style="font-size:13px">'+esc(u.text)+'</div></div>';
    });
  } else {
    h += '<div class="dim" style="font-size:12px">No updates yet.</div>';
  }
  h += '</div></div>';
  return h;
}

function toggleProjectUpdates(id) {
  const el = document.getElementById("updates-"+id);
  if (el) el.classList.toggle("hidden");
}
function showAddUpdate(id) {
  const el = document.getElementById("add-update-"+id);
  if (el) el.classList.toggle("hidden");
}
function addProjectUpdate(id) {
  const input = document.getElementById("update-text-"+id);
  if (!input || !input.value.trim()) return;
  const proj = state.projects.find(p => p.id === id);
  if (!proj) return;
  if (!proj.updates) proj.updates = [];
  proj.updates.push({ date: new Date().toISOString(), text: input.value.trim() });
  save(); render();
}
function addProject() {
  const name = document.getElementById("proj-name").value.trim();
  if (!name) return;
  const cat = document.getElementById("proj-cat").value;
  const notes = document.getElementById("proj-notes").value;
  const val = document.getElementById("proj-val").value;
  const proj = { id: uid(), name: name, category: cat, notes: notes, updates: [] };
  if (cat === "professional") proj.monthlyValue = +(val || 0);
  state.projects.push(proj);
  save(); render();
}
function editProjectNotes(id) {
  const proj = state.projects.find(p => p.id === id);
  if (!proj) return;
  const n = prompt("Notes:", proj.notes);
  if (n !== null) { proj.notes = n; save(); render(); }
}
function removeProject(id) {
  if (!confirm("Remove this project?")) return;
  state.projects = state.projects.filter(p => p.id !== id);
  save(); render();
}
function moveProjectCategory(id, newCategory) {
  const proj = state.projects.find(p => p.id === id);
  if (!proj) return;
  proj.category = newCategory;
  if (newCategory === "professional" && !proj.monthlyValue) proj.monthlyValue = 0;
  projectsSubTab = newCategory;
  save(); render();
}
// Toggle $/mo field visibility based on category selection
function projCatChange() {
  const cat = document.getElementById("proj-cat").value;
  const wrap = document.getElementById("proj-val-wrap");
  if (wrap) {
    if (cat === "professional") wrap.classList.remove("hidden");
    else wrap.classList.add("hidden");
  }
}

// ===== OPPORTUNITIES (DEALS) =====
function renderOpportunities() {
  let h = '<div class="flex-between mb-12"><h3>Deal Pipeline</h3><button class="btn" onclick="document.getElementById(\'add-opp\').classList.toggle(\'hidden\')">+ Add</button></div>';
  h += '<div id="add-opp" class="card hidden" style="border-color:var(--gold-dim)"><input class="input mb-8" id="opp-name" placeholder="Name"><div class="flex gap-8 mb-8"><select class="select flex-1" id="opp-stage">'+STAGES.map((s,i)=>'<option value="'+i+'">'+s+'</option>').join("")+'</select><select class="select flex-1" id="opp-type" onchange="oppTypeChange()"><option value="deal">deal</option><option value="client">client</option><option value="partnership">partnership</option><option value="pro-bono">pro-bono</option></select><div id="opp-val-wrap" style="flex:1"><input class="input" id="opp-val" type="number" placeholder="$/mo"></div></div><textarea class="input mb-8" id="opp-notes" placeholder="Notes" rows="2"></textarea><button class="btn" onclick="addOpp()">Add</button></div>';

    opps.forEach(opp => {
      h += '<div class="card" style="border-left:3px solid '+STAGE_COLORS[si]+';cursor:pointer" onclick="toggleEditOpp(\''+opp.id+'\')">';
      h += '<div class="flex-between"><div><span style="font-weight:600">'+esc(opp.name)+'</span>'+tagHTML(opp.type, STAGE_COLORS[si])+'</div>'+(opp.monthlyValue>0?'<span class="gold" style="font-weight:600">$'+opp.monthlyValue.toLocaleString()+'/mo</span>':'')+'</div>';
      h += progressHTML((si/(STAGES.length-1))*100, STAGE_COLORS[si], 4);
      h += '<div id="edit-'+opp.id+'" class="hidden" style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)" onclick="event.stopPropagation()">';
      h += '<textarea class="input mb-8" rows="2" onchange="updateOppNotes(\''+opp.id+'\',this.value)">'+esc(opp.notes)+'</textarea>';
      h += '<div class="flex gap-8 flex-wrap"><select class="select" onchange="updateOppStage(\''+opp.id+'\',+this.value)">'+STAGES.map((s,i)=>'<option value="'+i+'"'+(i===opp.stage?' selected':'')+'>'+s+'</option>').join("")+'</select>';
      h += '<input class="input" type="number" style="width:120px" value="'+(opp.monthlyValue||'')+'" placeholder="$/mo" onchange="updateOppVal(\''+opp.id+'\',+this.value)">';

    h += '</div>';
  });
  return h;

function oppTypeChange() {
  const type = document.getElementById("opp-type").value;
  const wrap = document.getElementById("opp-val-wrap");
  if (wrap) {
    if (type === "pro-bono") wrap.style.display = "none";
    else wrap.style.display = "";
  }
}
function addOpp() {
  const n=document.getElementById("opp-name").value.trim(); if(!n) return;
  const type = document.getElementById("opp-type").value;
  const val = type === "pro-bono" ? 0 : +(document.getElementById("opp-val").value||0);
  state.opportunities.push({ id:uid(), name:n, stage:+document.getElementById("opp-stage").value, notes:document.getElementById("opp-notes").value, monthlyValue:val, type:type });
  save(); render();
}
function toggleEditOpp(id) { const el=document.getElementById("edit-"+id); if(el) el.classList.toggle("hidden"); }
function updateOppNotes(id,v) { const o=state.opportunities.find(x=>x.id===id); if(o){o.notes=v;save();} }
function updateOppStage(id,v) { const o=state.opportunities.find(x=>x.id===id); if(o){if(v>o.stage)addXP(XP_VALUES.deal_advance,"Deal Advanced");if(v>=4&&o.stage<4)addXP(XP_VALUES.deal_close,"DEAL CLOSED!");o.stage=v;save();render();} }
function updateOppVal(id,v) { const o=state.opportunities.find(x=>x.id===id); if(o){o.monthlyValue=v;save();render();} }
function removeOpp(id) { if(!confirm("Remove?")) return; state.opportunities=state.opportunities.filter(o=>o.id!==id); save(); render(); }
function moveToProjects(id) {
  const opp = state.opportunities.find(o => o.id === id);
  if (!opp) return;
  if (!confirm("Move '" + opp.name + "' to Projects as a professional project?")) return;
  if (!state.projects) state.projects = [];
  state.projects.push({
    id: opp.id,
    name: opp.name,
    category: "professional",
    notes: opp.notes,
    monthlyValue: opp.monthlyValue || 0,
    updates: [{ date: new Date().toISOString(), text: "Migrated from Deals (was at Collecting Revenue stage)." }]
  });
  state.opportunities = state.opportunities.filter(o => o.id !== id);
  save(); render();
}

// ===== SESSIONS =====
function renderSessions(c) {
  let h = '<div class="flex-between mb-4"><h3>Session Clients</h3><button class="btn" onclick="document.getElementById(\'add-ses\').classList.toggle(\'hidden\')">+ Add</button></div>';
  h += '<p class="dim mb-16" style="font-size:13px">1-off sessions ($350) and 4-session packages ($1,200).</p>';

  h += '<div class="grid-3 mb-16">'+[{l:"Clients",v:(state.sessions||[]).length,c:"var(--cyan)"},{l:"Total Booked",v:"$"+c.sesRev.toLocaleString(),c:"var(--green)"},{l:"Sessions Left",v:c.sesLeft,c:"var(--yellow)"}].map(s=>'<div class="card stat-card"><div class="stat-val" style="color:'+s.c+'">'+s.v+'</div><div class="stat-label">'+s.l+'</div></div>').join("")+'</div>';
  (state.sessions||[]).forEach(ses => {
    const pct=(ses.sessionsUsed/ses.sessionsTotal)*100, done=ses.sessionsUsed>=ses.sessionsTotal;
    h += '<div class="card" style="border-left:3px solid '+(done?"var(--green)":"var(--cyan)")+';opacity:'+(done?0.6:1)+'"><div class="flex-between mb-4"><div><span style="font-weight:600">'+esc(ses.name)+'</span>'+tagHTML(ses.package==="single"?"1-off $350":"4-pack $"+ses.price, ses.package==="single"?"var(--yellow)":"var(--cyan)")+'</div><span style="font-weight:700;font-size:16px">'+ses.sessionsUsed+'/'+ses.sessionsTotal+'</span></div>';
    h += progressHTML(pct, done?"var(--green)":"var(--cyan)", 8);
    if(ses.notes) h += '<div class="dim mt-8" style="font-size:12px">'+esc(ses.notes)+'</div>';
    h += '<div class="flex gap-8 mt-8">';
    if(!done) h += '<button class="btn" onclick="markSession(\''+ses.id+'\')">Mark Session Done</button>';
    else h += '<span style="color:var(--green);font-weight:600">All delivered</span>';
    h += '<button class="btn-ghost btn-sm" onclick="editSessionNotes(\''+ses.id+'\')">Edit</button>';
    h += '<button class="btn-icon" style="margin-left:auto;color:var(--red)" onclick="removeSession(\''+ses.id+'\')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button>';
    h += '</div></div>';
  });
  return h;
}
function sesPkgChange() { const v=document.getElementById("ses-pkg").value; document.getElementById("ses-price").value=v==="single"?350:1200; }
function addSession() {
  const n=document.getElementById("ses-name").value.trim(); if(!n) return;
  const pkg=document.getElementById("ses-pkg").value;
  state.sessions.push({ id:uid(), name:n, package:pkg, price:+(document.getElementById("ses-price").value||0), sessionsTotal:pkg==="single"?1:4, sessionsUsed:0, notes:document.getElementById("ses-notes").value });

}

function renderActions(c) {

  h += '<div class="card"><div class="label">Waiting For</div><div class="flex gap-8 mb-8"><input class="input flex-1" id="wf-text" placeholder="Who / what?" onkeydown="if(event.key===\'Enter\')addWaiting()"><button class="btn-ghost" onclick="addWaiting()">Add</button></div>';
  state.waitingFor.forEach((w,i) => { h += '<div class="flex-between section-divider"><span style="font-size:13px">'+esc(w.text)+' <span class="dim">('+fmtDate(w.created)+')</span></span><button class="btn-icon" style="color:var(--green)" onclick="resolveWaiting('+i+')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg></button></div>'; });
  h += '</div>';

    });
    h += '</div>';
  });
  return h;
}
function addAction() {
  const oid=document.getElementById("act-opp").value, txt=document.getElementById("act-text").value.trim();

  state.weeklyActions[oid].push({ id:uid(), text:txt, done:false });
  document.getElementById("act-text").value=""; save(); render();
}
function toggleAction(oid, aid) {
  const acts=state.weeklyActions[oid]; if(!acts) return;
  const a=acts.find(x=>x.id===aid); if(!a) return;
  if(!a.done) addXP(XP_VALUES.action,"Action Complete");
  a.done=!a.done; save(); render();
}
function removeAction(oid, aid) { if(!state.weeklyActions[oid]) return; state.weeklyActions[oid]=state.weeklyActions[oid].filter(a=>a.id!==aid); save(); render(); }
function addWaiting() { const el=document.getElementById("wf-text"); if(!el.value.trim()) return; state.waitingFor.push({text:el.value.trim(),created:new Date().toISOString()}); el.value=""; save(); render(); }
function resolveWaiting(i) { state.waitingFor.splice(i,1); addXP(XP_VALUES.action,"Resolved"); }
function addSomeday() { const el=document.getElementById("sm-text"); if(!el.value.trim()) return; state.somedayMaybe.push(el.value.trim()); el.value=""; save(); render(); }
function activateSomeday(i) { state.inbox.push({id:uid(),text:state.somedayMaybe[i],created:new Date().toISOString()}); state.somedayMaybe.splice(i,1); save(); render(); }
function removeSomeday(i) { state.somedayMaybe.splice(i,1); save(); render(); }

function renderHabits() {
  let h = '<h3 class="mb-4">Weekly Habits</h3><p class="dim mb-16" style="font-size:13px">Each tap = one rep. Hit the target to keep your streak alive.</p>';
  state.habits.forEach(hab => {
    const count = state.habitLog[hab.id]||0, pct=(count/hab.target)*100, done=count>=hab.target;
    h += '<div class="card" style="opacity:'+(done?0.7:1)+'"><div class="flex-between mb-8"><div class="flex-center gap-8"><span style="font-weight:600">'+esc(hab.name)+'</span></div><div><span style="font-weight:700;font-size:18px;color:'+(done?"var(--green)":"var(--text)")+'">'+count+'</span><span class="dim"> / '+hab.target+'</span></div></div>';
    h += progressHTML(pct, done?"var(--green)":"var(--gold)");
    h += '<div class="flex gap-8 mt-8"><button class="btn" onclick="habitPlus(\''+hab.id+'\')">+1</button><button class="btn-ghost" onclick="habitMinus(\''+hab.id+'\')">-1</button>'+(done?'<span style="color:var(--green);font-weight:600;margin-left:auto">Target hit</span>':'')+'</div></div>';
  });
  return h;
}
function habitPlus(id) { state.habitLog[id]=(state.habitLog[id]||0)+1; addXP(XP_VALUES.habit,"Habit Rep"); }
function habitMinus(id) {
  const prev = state.habitLog[id]||0;
  if (prev > 0) {
    state.habitLog[id] = prev - 1;
    addXP(-XP_VALUES.habit, "Habit Undone");
  }
}

function inboxAction(id) {
  const item=state.inbox.find(x=>x.id===id); if(!item) return;
  const name=prompt("Which opportunity? (or blank)");

function freshWeek() { if(!confirm("Reset actions, habits, review for fresh week?")) return; saveSnapshot(); state.weeklyActions={}; state.habitLog={}; state.weeklyReview={}; save(); render(); }
function saveSnapshot() {
  const c=computed(), wk=getWeekId();

  const savedVault = sessionStorage.getItem('sev-vault');
  if (savedVault) {
    vaultPath = savedVault;
    try {
      const found = await loadFromFirebase();
      if (found) {
        lock.classList.add('hidden');
        render();
        checkAutoBackup();
        return;
      }
    } catch(e) { console.warn('Auto-login failed, showing PIN screen'); }
    sessionStorage.removeItem('sev-vault');
    vaultPath = null;
  }
  // No saved session — show lock screen
  lock.style.opacity = '1';

  pinBtn.onclick = async () => {
    const pin = pinInput.value;
    if (pin.length < 4) { pinError.textContent = 'At least 4 characters'; return; }
    pinError.textContent = '';
    pinBtn.textContent = 'Loading...';
    pinBtn.disabled = true;

    try {
      const hash = await hashPIN(pin);
      const OWNER_HASH = '869c1d77870789124ccd0c348d5d6bd9bf0c019836a53ebce6cd6ea3551b1702';
      if (hash !== OWNER_HASH) {
        pinError.textContent = 'Wrong PIN.';
        pinInput.value = '';
        pinBtn.textContent = 'Unlock';
        pinBtn.disabled = false;
        return;
      }
      vaultPath = 'vaults/' + hash;
      sessionStorage.setItem('sev-vault', vaultPath);
      const found = await loadFromFirebase();

      if (found) {
        lock.classList.add('hidden');
        trackStreak(); save(); render();
        checkAutoBackup();
      } else {
        pinError.textContent = 'Wrong PIN.';
        pinInput.value = '';
        pinBtn.textContent = 'Unlock';
        pinBtn.disabled = false;
      }
    } catch(e) {
      console.error(e);
      pinError.textContent = 'Connection error. Try again.';
      pinBtn.textContent = 'Unlock';
      pinBtn.disabled = false;
    }
  };

  pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') pinBtn.click(); });
  pinInput.focus();
}

// ===== APPLE TOUCH ICON (canvas-generated PNG) =====
(function() {
  const canvas = document.createElement('canvas');
  canvas.width = 180; canvas.height = 180;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, 180, 180);
  ctx.font = '140px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('✅', 90, 95);
  const url = canvas.toDataURL('image/png');
  const link = document.createElement('link');
  link.rel = 'apple-touch-icon';
  link.href = url;
  document.head.appendChild(link);
})();

// ===== PULL TO REFRESH (mobile) =====
(function() {
  const THRESHOLD = 80;
  let startY = 0, pulling = false, pullDist = 0;
  const indicator = document.getElementById('pull-indicator');
  const pullText = document.getElementById('pull-text');

  document.addEventListener('touchstart', function(e) {
    if (document.getElementById('lock-screen').classList.contains('hidden') && window.scrollY <= 0) {
      startY = e.touches[0].clientY;
      pulling = true;
      pullDist = 0;
      indicator.classList.remove('releasing', 'loading');
    }
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy < 0) { pullDist = 0; indicator.style.height = '0px'; return; }
    if (dy > 10) e.preventDefault();
    pullDist = Math.min(dy * 0.5, 120);
    indicator.style.height = pullDist + 'px';
    if (pullDist >= THRESHOLD) {
      pullText.textContent = '↑ Release to refresh';
      pullText.classList.add('visible');
    } else if (pullDist > 20) {
      pullText.textContent = '↓ Pull to refresh';
      pullText.classList.add('visible');
    } else {
      pullText.classList.remove('visible');
    }
  }, { passive: false });

  document.addEventListener('touchend', async function() {
    if (!pulling) return;
    pulling = false;
    if (pullDist >= THRESHOLD && vaultPath) {
      indicator.classList.add('loading');
      indicator.style.height = '50px';
      try {
        await loadFromFirebase();
        render();
      } catch(e) { console.error('Refresh failed', e); }
      setTimeout(() => {
        indicator.classList.add('releasing');
        indicator.style.height = '0px';
        setTimeout(() => indicator.classList.remove('releasing', 'loading'), 300);
      }, 400);
    } else {
      indicator.classList.add('releasing');
      indicator.style.height = '0px';
      setTimeout(() => indicator.classList.remove('releasing'), 300);
    }
  }, { passive: true });
})();

initApp();
</script>
